<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fleet Health Autopilot</title>
<style>
#fha-root, #fha-root * { box-sizing: border-box !important; margin: 0 !important; padding: 0 !important; }
#fha-root { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif !important; color: #0f172a !important; background: #f8fafc !important; }

/* ── Animations ── */
@keyframes fha-spin { to { transform: rotate(360deg); } }
@keyframes fha-fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fha-fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes fha-slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fha-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
@keyframes fha-progressGlow { 0% { box-shadow: 0 0 4px rgba(0,120,211,0.3); } 50% { box-shadow: 0 0 12px rgba(0,120,211,0.5); } 100% { box-shadow: 0 0 4px rgba(0,120,211,0.3); } }
@keyframes fha-shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
@keyframes fha-countUp { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }
@keyframes fha-dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60%, 100% { content: '...'; } }
.fha-typing::after { content: ''; animation: fha-dots 1.4s infinite steps(1); }

/* ── Animated card entrance ── */
.fha-card-anim { animation: fha-fadeUp 0.4s ease-out both; }
.fha-card-anim:nth-child(1) { animation-delay: 0.05s; }
.fha-card-anim:nth-child(2) { animation-delay: 0.1s; }
.fha-card-anim:nth-child(3) { animation-delay: 0.15s; }
.fha-card-anim:nth-child(4) { animation-delay: 0.2s; }
.fha-card-anim:nth-child(5) { animation-delay: 0.25s; }
.fha-card-anim:nth-child(6) { animation-delay: 0.3s; }
.fha-card-anim:nth-child(7) { animation-delay: 0.35s; }
.fha-card-anim:nth-child(8) { animation-delay: 0.4s; }

/* ── Loading progress bar ── */
.fha-progress-track { width: 100%; height: 4px; background: #e2e8f0; border-radius: 2px; overflow: hidden; }
.fha-progress-bar { height: 100%; border-radius: 2px; background: #0078D3; background-size: 200% 100%; animation: fha-shimmer 1.5s linear infinite, fha-progressGlow 2s ease-in-out infinite; transition: width 0.6s ease-out; }

/* ── Gauge SVG animation ── */
.fha-gauge-arc { transition: stroke-dashoffset 1s cubic-bezier(0.4, 0, 0.2, 1); }
</style>
</head>
<body style="margin:0;padding:0;">

<div id="fha-root">
  <div id="fha-app"></div>
</div>
<div id="fha-map-view" style="display:none;"></div>

<script>
/* Shim for hosted/standalone mode (outside MyGeotab iframe) */
if (typeof geotab === "undefined") {
  var geotab = { addin: {} };
  window.addEventListener("load", function () {
    var addinFn = geotab.addin["fleet-health-autopilot"];
    if (addinFn) {
      var instance = addinFn();
      var mockState = {
        getGroupFilter: function () {
          return [{ id: "GroupCompanyId" }];
        }
      };
      var mockApi = {
        getSession: function (cb) {
          cb({ database: "demo_beyondclarity", userName: "owen@beyondclarity.com.au", sessionId: "mock-session-id", server: "my.geotab.com" });
        },
        call: function (method, params, success, error) {
          if (method === "Get" && params.typeName === "User") {
            success([
              { name: "owen@beyondclarity.com.au", firstName: "Owen", lastName: "Clinton" },
              { name: "demo@geotab.com", firstName: "Demo", lastName: "User" },
              { name: "fleet.manager@woolworths.com.au", firstName: "Sarah", lastName: "Mitchell" },
              { name: "ops@penske.com.au", firstName: "James", lastName: "Thornton" }
            ]);
          } else if (method === "Get" && params.typeName === "Group") {
            success([
              { id: "GroupCompanyId", name: "Company", parent: { id: "GroupRootId" } },
              { id: "b1234", name: "Sydney Metro", parent: { id: "GroupCompanyId" } },
              { id: "b1235", name: "Brisbane North", parent: { id: "GroupCompanyId" } },
              { id: "b1236", name: "Melbourne CBD", parent: { id: "GroupCompanyId" } },
              { id: "b1237", name: "HomeRun Delivery", parent: { id: "GroupCompanyId" } },
              { id: "b1238", name: "Long Haul", parent: { id: "GroupCompanyId" } }
            ]);
          } else if (method === "Get" && params.typeName === "Rule") {
            success([
              { id: "rule-speed", name: "Speeding" },
              { id: "rule-brake", name: "Harsh Braking" },
              { id: "rule-corner", name: "Harsh Cornering" },
              { id: "rule-seatbelt", name: "Seatbelt" },
              { id: "rule-idle", name: "Excessive Idling" },
              { id: "rule-afterhours", name: "After Hours Usage" }
            ]);
          } else if (method === "Get" && params.typeName === "ExceptionEvent") {
            var mockEvts = [], base = new Date().getTime() - 86400000;
            for (var me = 0; me < 40; me++) {
              mockEvts.push({ id: "ee" + me, device: { id: "d" + (me % 5) }, activeFrom: new Date(base + me * 1800000).toISOString(), activeTo: new Date(base + me * 1800000 + 60000).toISOString(), rule: params.search.ruleSearch });
            }
            success(mockEvts);
          } else if (method === "Get" && params.typeName === "LogRecord") {
            var mockLogs = [], lb = new Date().getTime() - 86400000;
            for (var ml = 0; ml < 60; ml++) {
              mockLogs.push({ dateTime: new Date(lb + ml * 900000).toISOString(), latitude: -27.47 + (Math.random() - 0.5) * 0.15, longitude: 153.02 + (Math.random() - 0.5) * 0.2, speed: Math.random() * 80 });
            }
            success(mockLogs);
          } else { success([]); }
        }
      };
      instance.initialize(mockApi, mockState, function () {});
    }
  });
}
geotab.addin["fleet-health-autopilot"] = function () {
  "use strict";

  /* ── Design Tokens v6 — Geotab Zenith ── */
  var C = {
    blue: "#0078D3",
    blueHover: "#005FA8",
    blueDark: "#004A82",
    blueLight: "#E5F1FB",
    blueGlow: "#E5F1FB",
    textPrimary: "#1F2833",
    textSecondary: "#556575",
    textMuted: "#748FAA",
    textWhite: "#ffffff",
    bgMain: "#ffffff",
    bgPage: "#F2F5F7",
    bgSecondary: "#F2F5F7",
    bgElevated: "#ffffff",
    border: "#C0CCD8",
    borderLight: "#DDE6EC",
    borderSubtle: "#EEF2F5",
    danger: "#D32F2F",
    dangerDark: "#B71C1C",
    dangerBg: "#FFF5F5",
    dangerBorder: "#F5C6CB",
    dangerGlow: "#FFF5F5",
    success: "#2E7D32",
    successDark: "#1B5E20",
    successBg: "#F1F8F1",
    successBorder: "#C8E6C9",
    successGlow: "#F1F8F1",
    warn: "#F57C00",
    warnDark: "#E65100",
    warnBg: "#FFF8E1",
    warnBorder: "#FFE0B2",
    warnGlow: "#FFF8E1",
    radius: "4px",
    radiusSm: "4px",
    radiusMd: "4px",
    radiusLg: "8px",
    radiusFull: "9999px",
    shadow: "none",
    shadowMd: "0 2px 4px rgba(0,0,0,0.08)",
    shadowLg: "0 4px 12px rgba(0,0,0,0.12)"
  };

  var elApp = document.getElementById("fha-app");
  var storedApi = null;
  var currentDb = "";
  var activeDeviceIds = null; /* Populated from Geotab API — only non-archived devices */
  var currentUserEmail = "";
  var currentUserName = "";
  var currentFirstName = "";
  var geotabUsers = [];
  var geotabGroups = [];
  var activeGroupFilter = [];
  var groupFilterWasRead = false;
  var activeGroupNames = [];
  var sessionCredentials = null;
  var webhookBase = "https://beyondc.duckdns.org/n8n/webhook/fleet-health-scan";
  var askWebhookBase = "https://beyondc.duckdns.org/n8n/webhook/fleet-health-ask";
  var isLoading = false;
  var lastData = null;
  var scanHistory = [];
  var currentView = "dashboard";
  var chatMessages = [];
  var isChatOpen = false;
  var isChatLoading = false;
  var showSettingsFlag = false;
  var mapViewActive = false;
  var mapLeafletLoaded = false;
  var mapInstance = null;
  var heatLayerInstance = null;
  var mapMarkersLayer = null;
  var cachedRules = null;
  var cachedDeviceNames = {};
  var mapDateRange = "yesterday";
  var mapEnrichedPoints = [];
  var mapActiveRules = [];
  var mapRuleLayers = {};
  var mapRuleColors = ["#D32F2F","#1565C0","#F57F17","#2E7D32","#6A1B9A","#E65100","#00838F","#AD1457"];
  var mapVehicleFilter = null;
  var mapRawEventCount = 0;
  var mapTruncated = false;
  var elMap = document.getElementById("fha-map-view");
  var greetingIndex = 0;
  var greetings = [
    "Ready to check your fleet?",
    "Let\u2019s see how your vehicles are doing",
    "Time for a health check",
    "Your fleet awaits",
    "What\u2019s happening across the fleet?",
    "Let\u2019s keep your fleet in top shape"
  ];

  var emailConfig = {
    recipient: "",
    additionalRecipients: [],
    autoEmail: true,
    scheduleHour: 6,
    scheduleMin: 0,
    reportGroupId: "",
    reportGroupName: "",
    webhookUrl: ""
  };

  try {
    var saved = localStorage.getItem("fha-email-config");
    if (saved) {
      var p = JSON.parse(saved);
      if (p.recipient) emailConfig.recipient = p.recipient;
      if (p.additionalRecipients) emailConfig.additionalRecipients = p.additionalRecipients;
      if (typeof p.autoEmail !== "undefined") emailConfig.autoEmail = p.autoEmail;
      if (typeof p.scheduleHour !== "undefined") emailConfig.scheduleHour = p.scheduleHour;
      if (typeof p.scheduleMin !== "undefined") emailConfig.scheduleMin = p.scheduleMin;
      if (p.reportGroupId) emailConfig.reportGroupId = p.reportGroupId;
      if (p.reportGroupName) emailConfig.reportGroupName = p.reportGroupName;
      if (p.webhookUrl) emailConfig.webhookUrl = p.webhookUrl;
    }
  } catch (e) {}
  if (emailConfig.webhookUrl) webhookBase = emailConfig.webhookUrl;

  function saveConfig() {
    try { localStorage.setItem("fha-email-config", JSON.stringify(emailConfig)); } catch (e) {}
  }

  function esc(str) {
    var d = document.createElement("div");
    d.appendChild(document.createTextNode(str || ""));
    return d.innerHTML;
  }

  function gtBase() { return "https://my.geotab.com/" + currentDb; }
  function gtExcLink(did, ruleIds) {
    /* When Risk Map is active, use exact queried date range + rule filters */
    if (mapViewActive) {
      var range = getMapDateRange();
      var url = gtBase() + "/#exceptions2,assetsFilter:!(" + did + "),dateRange:(from:'" + range.from + "',to:'" + range.to + "'),entityType:Device,selectedEntities:!(" + did + ")";
      if (ruleIds && ruleIds.length > 0) {
        url += ",ruleIds:!(" + ruleIds.join(",") + ")";
      } else if (mapActiveRules && mapActiveRules.length > 0) {
        var ids = [];
        for (var i = 0; i < mapActiveRules.length; i++) { ids.push(mapActiveRules[i].id); }
        url += ",ruleIds:!(" + ids.join(",") + ")";
      }
      return url;
    }
    /* Scanner context — use Yesterday default */
    return gtBase() + "/#exceptions2,assetsFilter:!(" + did + "),dateRange:(interval:Yesterday),entityType:Device,selectedEntities:!(" + did + ")";
  }
  function gtTripsLink(did) { return gtBase() + "/#tripsHistory,dateRange:(interval:Yesterday),entityType:Device,selectedEntities:!(" + did + ")"; }
  function gtMapLink(did) { return gtBase() + "/#map,liveVehicleIds:!(" + did + ")"; }
  function gtAllExcLink() { return gtBase() + "/#exceptions2,dateRange:(interval:Yesterday),entityType:Device"; }

  function formatTime() {
    var d = new Date();
    try { return d.toLocaleString("en-AU", { timeZone: "Australia/Brisbane", weekday: "short", day: "numeric", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit" }) + " AEST"; }
    catch (e) { return d.toLocaleString(); }
  }

  function isMech(v) {
    var e = v.exceptions || {}, f = v.faults || {};
    return (e.engineLight > 0 || e.engineFault > 0 || e.collision > 0 || f.critical > 0 || f.active > 0);
  }

  /* ── SVG Gauge ── */
  function buildGaugeSVG(score, size) {
    var sz = size || 72;
    var r = 40;
    var circ = 2 * Math.PI * r;
    var half = circ / 2;
    var pct = Math.max(0, Math.min(100, score)) / 100;
    var offset = half - (half * pct);
    var color, glowColor;
    if (score >= 80) { color = C.success; glowColor = C.successGlow; }
    else if (score >= 60) { color = C.warn; glowColor = C.warnGlow; }
    else { color = C.danger; glowColor = C.dangerGlow; }
    var svg = '<svg width="' + sz + '" height="' + (sz * 0.6) + '" viewBox="0 0 100 60" style="overflow:visible !important;">';
    svg += '<path d="M 10 55 A 40 40 0 0 1 90 55" fill="none" stroke="' + C.borderLight + '" stroke-width="7" stroke-linecap="round" />';
    svg += '<path d="M 10 55 A 40 40 0 0 1 90 55" fill="none" stroke="' + color + '" stroke-width="7" stroke-linecap="round" class="fha-gauge-arc" stroke-dasharray="' + half.toFixed(1) + '" stroke-dashoffset="' + offset.toFixed(1) + '" style="filter:drop-shadow(0 0 4px ' + glowColor + ');" />';
    svg += '<text x="50" y="48" text-anchor="middle" style="font-size:22px !important;font-weight:700 !important;fill:' + color + ' !important;font-family:-apple-system,BlinkMacSystemFont,sans-serif !important;">' + score + '</text>';
    svg += '<text x="50" y="58" text-anchor="middle" style="font-size:7px !important;fill:' + C.textMuted + ' !important;letter-spacing:1.5px !important;text-transform:uppercase !important;font-family:-apple-system,BlinkMacSystemFont,sans-serif !important;">HEALTH</text>';
    svg += '</svg>';
    return svg;
  }

  function miniScore(score) {
    var color, bg, bd;
    if (score >= 95) { color = C.successDark; bg = C.successBg; bd = C.successBorder; }
    else if (score >= 80) { color = "#00695C"; bg = "#E0F2F1"; bd = "#B2DFDB"; }
    else if (score >= 60) { color = C.warnDark; bg = C.warnBg; bd = C.warnBorder; }
    else { color = C.dangerDark; bg = C.dangerBg; bd = C.dangerBorder; }
    return '<span style="display:inline-flex !important;align-items:center !important;justify-content:center !important;min-width:36px !important;height:24px !important;border-radius:' + C.radius + ' !important;background:' + bg + ' !important;border:1px solid ' + bd + ' !important;font-size:12px !important;font-weight:700 !important;color:' + color + ' !important;padding:0 8px !important;">' + score + '</span>';
  }

  function btnStyle(variant) {
    var base = "display:inline-flex !important;align-items:center !important;gap:6px !important;font-family:Roboto,'Segoe UI',sans-serif !important;font-size:12px !important;font-weight:500 !important;line-height:20px !important;border-radius:" + C.radius + " !important;padding:7px 14px !important;cursor:pointer !important;border:1px solid !important;text-decoration:none !important;white-space:nowrap !important;transition:background 0.15s ease !important;";
    if (variant === "primary") return base + "background:" + C.blue + " !important;border-color:" + C.blue + " !important;color:" + C.textWhite + " !important;";
    if (variant === "danger") return base + "background:" + C.danger + " !important;border-color:" + C.danger + " !important;color:" + C.textWhite + " !important;";
    if (variant === "tertiary") return base + "background:transparent !important;border-color:transparent !important;color:" + C.blue + " !important;";
    return base + "background:" + C.bgMain + " !important;border-color:" + C.border + " !important;color:" + C.textPrimary + " !important;";
  }

  function mkPill(label, type) {
    var bg, bd, cl;
    if (type === "danger" || type === "mech") { bg = C.dangerBg; bd = C.dangerBorder; cl = C.dangerDark; }
    else if (type === "warn") { bg = C.warnBg; bd = C.warnBorder; cl = C.warnDark; }
    else { bg = C.bgSecondary; bd = C.borderLight; cl = C.textSecondary; }
    return '<span style="display:inline-flex !important;align-items:center !important;gap:3px !important;background:' + bg + ' !important;border:1px solid ' + bd + ' !important;border-radius:' + C.radius + ' !important;padding:2px 8px !important;font-size:11px !important;font-weight:500 !important;color:' + cl + ' !important;margin:0 4px 4px 0 !important;">' + esc(label) + '</span>';
  }

  function buildPills(v) {
    var e = v.exceptions || {}, f = v.faults || {}, h = "";
    if (e.engineLight > 0) h += mkPill(e.engineLight + " engine light", "mech");
    if (e.engineFault > 0) h += mkPill(e.engineFault + " engine fault", "mech");
    if (e.collision > 0) h += mkPill(e.collision + " collision", "mech");
    if (f.critical > 0) h += mkPill(f.critical + " critical DTC", "mech");
    if (f.active > 0) h += mkPill(f.active + " active DTC", "mech");
    if (e.seatbelt > 0) h += mkPill(e.seatbelt + " seatbelt", "danger");
    if (e.speeding > 0) h += mkPill(e.speeding + " speeding", "danger");
    if (e.cornering > 0) h += mkPill(e.cornering + " cornering", "warn");
    if (e.braking > 0) h += mkPill(e.braking + " braking", "warn");
    if (e.accel > 0) h += mkPill(e.accel + " accel", "warn");
    h += mkPill((v.trips || 0) + " trips", "neutral");
    if (v.distKm > 0) h += mkPill(v.distKm + " km", "neutral");
    return h;
  }

  /* ── Vehicle card v5 ── */
  function buildCard(v, idx) {
    var sc = v.healthScore || 0, did = v.deviceId || "";
    var accentColor;
    if (sc < 60) { accentColor = C.danger; }
    else if (sc < 80) { accentColor = C.warn; }
    else { accentColor = C.success; }
    var h = '<div style="margin:0 0 8px 0 !important;background:' + C.bgMain + ' !important;border:1px solid ' + C.borderLight + ' !important;border-left:3px solid ' + accentColor + ' !important;border-radius:' + C.radius + ' !important;padding:12px 14px !important;">';
    h += '<div style="display:flex !important;align-items:center !important;justify-content:space-between !important;margin:0 0 10px 0 !important;">';
    h += '<div style="display:flex !important;align-items:center !important;gap:8px !important;">';
    h += '<span style="font-size:13px !important;font-weight:600 !important;color:' + C.textPrimary + ' !important;">' + esc(v.deviceName) + '</span>';
    if (v.groupName) h += '<span style="font-size:10px !important;color:' + C.textMuted + ' !important;background:' + C.bgSecondary + ' !important;padding:2px 6px !important;border-radius:' + C.radiusFull + ' !important;">' + esc(v.groupName) + '</span>';
    h += '</div>';
    h += miniScore(sc);
    h += '</div>';
    h += '<div style="margin:0 0 10px 0 !important;line-height:1.8 !important;">' + buildPills(v) + '</div>';
    if (v.aiDiagnosis) {
      h += '<div style="margin:0 0 10px 0 !important;padding:10px 14px !important;background:' + C.blueLight + ' !important;border-radius:' + C.radius + ' !important;border-left:3px solid ' + C.blue + ' !important;">';
      h += '<div style="display:flex !important;align-items:center !important;gap:5px !important;margin:0 0 4px 0 !important;">';
      h += '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="' + C.blue + '" stroke-width="2" stroke-linecap="round"><path d="M12 2a4 4 0 0 1 4 4v2a8 8 0 0 1-8 0V6a4 4 0 0 1 4-4z"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>';
      h += '<span style="font-size:10px !important;font-weight:600 !important;color:' + C.blue + ' !important;">AI Diagnosis</span>';
      h += '</div>';
      h += '<div style="font-size:12px !important;color:' + C.textPrimary + ' !important;line-height:1.55 !important;">' + esc(v.aiDiagnosis) + '</div>';
      if (v.aiRecommendation) {
        h += '<div style="font-size:11px !important;color:' + C.textSecondary + ' !important;margin:6px 0 0 0 !important;padding:6px 0 0 0 !important;border-top:1px solid ' + C.borderLight + ' !important;"><strong style="color:' + C.blue + ' !important;">Action:</strong> ' + esc(v.aiRecommendation) + '</div>';
      }
      h += '</div>';
    }
    /* Fault Code Intelligence — only for vehicles with actual DTCs, not driver behaviour */
    var fci = v.faultCodeIntel || [];
    var hasFaults = v.faults && v.faults.total > 0;
    if (fci.length > 0 && hasFaults) {
      h += '<div style="margin:0 0 10px 0 !important;border:1px solid ' + C.borderLight + ' !important;border-radius:' + C.radius + ' !important;overflow:hidden !important;">';
      h += '<div style="display:flex !important;align-items:center !important;gap:5px !important;padding:8px 12px !important;background:' + C.bgSecondary + ' !important;border-bottom:1px solid ' + C.borderLight + ' !important;cursor:pointer !important;" onclick="var el=this.parentNode.querySelector(\'[data-fci]\');if(el){var v=el.style.display===\'none\';el.style.cssText=v?\'display:block !important;\':\'display:none !important;\';this.querySelector(\'[data-chev]\').textContent=v?\'\u25BC\':\'\u25B6\';}">';
      h += '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="' + C.dangerDark + '" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>';
      h += '<span style="font-size:10px !important;font-weight:600 !important;color:' + C.dangerDark + ' !important;">Fault Code Intelligence</span>';
      h += '<span style="font-size:10px !important;color:' + C.textMuted + ' !important;margin:0 0 0 2px !important;">(' + fci.length + ')</span>';
      h += '<span style="font-size:10px !important;color:' + C.textMuted + ' !important;margin:0 0 0 auto !important;" data-chev>\u25BC</span>';
      h += '</div>';
      h += '<div data-fci style="display:block !important;">';
      for (var fi = 0; fi < fci.length; fi++) {
        var fc = fci[fi];
        var sevColor = fc.severity === "critical" ? C.dangerDark : fc.severity === "moderate" ? C.warnDark : C.textSecondary;
        var sevBg = fc.severity === "critical" ? C.dangerBg : fc.severity === "moderate" ? C.warnBg : C.bgSecondary;
        h += '<div style="padding:10px 12px !important;border-bottom:1px solid ' + C.borderSubtle + ' !important;">';
        h += '<div style="display:flex !important;align-items:center !important;gap:6px !important;margin:0 0 6px 0 !important;">';
        h += '<span style="font-size:11px !important;font-weight:700 !important;font-family:monospace !important;color:' + C.textPrimary + ' !important;background:' + C.bgSecondary + ' !important;padding:2px 6px !important;border-radius:3px !important;border:1px solid ' + C.borderLight + ' !important;">' + esc(fc.code || "Unknown") + '</span>';

    h += '<button id="fha-setup-save" style="' + btnStyle("primary") + 'flex:1 !important;padding:10px !important;font-size:13px !important;font-weight:600 !important;">Save &amp; Start</button>';

      var urlInput = document.getElementById("fha-setup-url");
      var statusEl = document.getElementById("fha-setup-status");
      var testUrl = (urlInput ? urlInput.value : "").replace(/\s+/g, "");
      if (!testUrl) { showSetupStatus(statusEl, "Please enter a webhook URL", "error"); return false; }
      showSetupStatus(statusEl, "Testing connection\u2026", "info");
      testBtn.textContent = "Testing\u2026";
      testBtn.style.opacity = "0.6";
      var xhr = new XMLHttpRequest();
      xhr.open("POST", testUrl, true);
      xhr.setRequestHeader("Content-Type", "application/json");
      xhr.timeout = 15000;
      xhr.onload = function () {
        testBtn.textContent = "Test Connection";
        testBtn.style.opacity = "1";
        if (xhr.status >= 200 && xhr.status < 300) {
          showSetupStatus(statusEl, "\u2713 Connected successfully!", "success");
        } else {
          showSetupStatus(statusEl, "Server returned status " + xhr.status, "error");
        }
      };
      xhr.onerror = function () { testBtn.textContent = "Test Connection"; testBtn.style.opacity = "1"; showSetupStatus(statusEl, "Connection failed. Check URL and server.", "error"); };
      xhr.ontimeout = function () { testBtn.textContent = "Test Connection"; testBtn.style.opacity = "1"; showSetupStatus(statusEl, "Connection timed out.", "error"); };
      xhr.send(JSON.stringify({ ping: true, database: currentDb }));
      return false;
    };
    var saveBtn = document.getElementById("fha-setup-save");
    if (saveBtn) saveBtn.onclick = function () {
      var urlInput = document.getElementById("fha-setup-url");
      var emailInput = document.getElementById("fha-setup-email");
      var statusEl = document.getElementById("fha-setup-status");
      var testUrl = (urlInput ? urlInput.value : "").replace(/\s+/g, "");
      if (!testUrl) { showSetupStatus(statusEl, "Please enter a webhook URL", "error"); return false; }
      emailConfig.webhookUrl = testUrl;
      emailConfig.recipient = emailInput ? emailInput.value : currentUserEmail;
      webhookBase = testUrl;
      saveConfig();
      showIdle();
      return false;
    };
  }

  function startFleetCatcher() {
    var vehicles = ["\uD83D\uDE97", "\uD83D\uDE99", "\uD83D\uDEFB", "\uD83D\uDE8C", "\uD83C\uDFCE\uFE0F", "\uD83D\uDE9A"];
    var activeCells = {};

    function spawnVehicle() {
      var grid = document.getElementById("fha-game-grid");
      if (!grid) { clearInterval(gameTimer); return; }
      var cells = grid.querySelectorAll(".fha-game-cell");
      /* Find empty cells */
      var empty = [];
      for (var i = 0; i < cells.length; i++) {
        if (!activeCells[i]) empty.push(i);
      }
      if (empty.length === 0) return;
      var idx = empty[Math.floor(Math.random() * empty.length)];
      var vehicle = vehicles[Math.floor(Math.random() * vehicles.length)];
      var cell = cells[idx];
      activeCells[idx] = true;
      cell.textContent = vehicle;
      cell.style.cssText = cell.style.cssText.replace(/background:[^;!]+!important/, "background:" + C.blueLight + " !important").replace(/border:[^;!]+!important/, "border:2px solid " + C.blue + " !important");
      cell.style.transform = "scale(1.05)";

      /* Click handler */
      cell.onclick = (function (ci, cl) {
        return function () {
          gameScore++;
          var scoreEl = document.getElementById("fha-game-score");
          if (scoreEl) scoreEl.textContent = "\u2714 " + gameScore;
          cl.textContent = "";
          cl.style.cssText = cl.style.cssText.replace(/background:[^;!]+!important/, "background:" + C.bgSecondary + " !important").replace(/border:[^;!]+!important/, "border:2px solid " + C.borderLight + " !important");
          cl.style.transform = "scale(1)";
          cl.onclick = null;
          delete activeCells[ci];
          /* Flash green */
          cl.style.cssText = cl.style.cssText.replace(/background:[^;!]+!important/, "background:rgba(34,197,94,0.15) !important");
          setTimeout(function () {
            cl.style.cssText = cl.style.cssText.replace(/background:[^;!]+!important/, "background:" + C.bgSecondary + " !important");
          }, 200);
          return false;
        };
      })(idx, cell);

      /* Auto-disappear after random time */
      var lifespan = 1200 + Math.floor(Math.random() * 1500);
      setTimeout(function () {
        if (activeCells[idx]) {
          gameMisses++;
          var missEl = document.getElementById("fha-game-miss");
          if (missEl) missEl.textContent = "\u2716 " + gameMisses;
          cell.textContent = "";
          cell.style.cssText = cell.style.cssText.replace(/background:[^;!]+!important/, "background:" + C.bgSecondary + " !important").replace(/border:[^;!]+!important/, "border:2px solid " + C.borderLight + " !important");
          cell.style.transform = "scale(1)";
          cell.onclick = null;
          delete activeCells[idx];
          /* Flash red */
          cell.style.cssText = cell.style.cssText.replace(/background:[^;!]+!important/, "background:rgba(239,68,68,0.1) !important");
          setTimeout(function () {
            cell.style.cssText = cell.style.cssText.replace(/background:[^;!]+!important/, "background:" + C.bgSecondary + " !important");
          }, 200);
        }
      }, lifespan);
    }

    /* Spawn vehicles at increasing rate */
    gameTimer = setInterval(function () {
      spawnVehicle();
    }, 900);
    /* Spawn first one immediately */
    setTimeout(spawnVehicle, 300);
  }

  /* ── Scan History Heatmap Timeline ── */
  function buildHistoryTimeline(history) {
    if (!history || history.length < 1) return "";
    var h = '<div style="margin:8px 0 0 0 !important;background:' + C.bgMain + ' !important;border:1px solid ' + C.borderLight + ' !important;border-radius:' + C.radius + ' !important;overflow:hidden !important;">';
    h += '<div style="display:flex !important;align-items:center !important;justify-content:space-between !important;padding:10px 16px 6px 16px !important;">';
    h += '<div style="display:flex !important;align-items:center !important;gap:5px !important;">';
    h += '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="' + C.blue + '" stroke-width="2" stroke-linecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>';
    h += '<span style="font-size:11px !important;font-weight:600 !important;color:' + C.blue + ' !important;font-family:Roboto,\'Segoe UI\',sans-serif !important;">Fleet Health Timeline</span>';
    h += '</div>';
    h += '<span style="font-size:10px !important;color:' + C.textMuted + ' !important;">' + history.length + ' scans</span>';
    h += '</div>';
    /* Mini sparkline chart using inline SVG */
    var pts = [];
    var minScore = 100, maxScore = 0;
    for (var i = 0; i < history.length; i++) {
      var s = history[i].fleetScore || 0;
      if (s < minScore) minScore = s;
      if (s > maxScore) maxScore = s;
    }
    var range = Math.max(maxScore - minScore, 10);
    var chartW = 320, chartH = 48, padY = 4;
    for (var j = 0; j < history.length; j++) {
      var x = history.length > 1 ? (j / (history.length - 1)) * chartW : chartW / 2;
      var y = padY + (chartH - 2 * padY) - ((history[j].fleetScore - minScore) / range) * (chartH - 2 * padY);
      pts.push(x.toFixed(1) + "," + y.toFixed(1));
    }
    var polyline = pts.join(" ");
    /* Fill area */
    var fillPts = "0," + chartH + " " + polyline + " " + chartW + "," + chartH;
    /* Determine trend */
    var latest = history[history.length - 1].fleetScore;
    var prev = history.length > 1 ? history[history.length - 2].fleetScore : latest;
    var trendColor = latest >= prev ? C.success : latest >= prev - 5 ? C.warn : C.danger;
    var lineColor = latest >= 80 ? C.success : latest >= 60 ? C.warn : C.danger;
    h += '<div style="padding:0 16px 6px 16px !important;overflow:hidden !important;">';
    h += '<svg width="100%" height="' + chartH + '" viewBox="0 0 ' + chartW + ' ' + chartH + '" preserveAspectRatio="none" style="display:block !important;">';
    h += '<defs><linearGradient id="fha-hg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="' + lineColor + '" stop-opacity="0.15"/><stop offset="100%" stop-color="' + lineColor + '" stop-opacity="0.02"/></linearGradient></defs>';
    h += '<polygon points="' + fillPts + '" fill="url(#fha-hg)" />';
    h += '<polyline points="' + polyline + '" fill="none" stroke="' + lineColor + '" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />';
    /* Latest point dot */
    var lastPt = pts[pts.length - 1].split(",");
    h += '<circle cx="' + lastPt[0] + '" cy="' + lastPt[1] + '" r="3" fill="' + lineColor + '" stroke="white" stroke-width="1.5" />';
    h += '</svg></div>';
    /* Heatmap grid: per-vehicle scores from most recent scan */
    var latestScan = history[history.length - 1];
    if (latestScan.vehicleScores && latestScan.vehicleScores.length > 0) {
      var vs = latestScan.vehicleScores;
      /* Sort worst-first */
      vs.sort(function (a, b) { return (a.score || 0) - (b.score || 0); });
      h += '<div style="padding:4px 16px 10px 16px !important;display:flex !important;flex-wrap:wrap !important;gap:3px !important;">';
      for (var k = 0; k < vs.length && k < 50; k++) {
        var vsc = vs[k].score || 0;
        var cellColor;
        if (vsc >= 90) cellColor = C.success;
        else if (vsc >= 80) cellColor = "#4ade80";
        else if (vsc >= 70) cellColor = C.warn;
        else if (vsc >= 60) cellColor = "#fb923c";
        else cellColor = C.danger;
        h += '<div title="' + esc(vs[k].name) + ': ' + vsc + '/100" style="width:14px !important;height:14px !important;border-radius:2px !important;background:' + cellColor + ' !important;opacity:0.85 !important;cursor:default !important;"></div>';
      }
      if (vs.length > 50) h += '<span style="font-size:10px !important;color:' + C.textMuted + ' !important;align-self:center !important;margin:0 0 0 4px !important;">+' + (vs.length - 50) + '</span>';
      h += '</div>';
    }
    /* Trend label */
    var trendArrow = latest > prev ? "\u25B2" : latest < prev ? "\u25BC" : "\u25CF";
    var trendLabel = latest > prev ? "Improving" : latest < prev ? "Declining" : "Stable";
    h += '<div style="padding:6px 16px 10px 16px !important;display:flex !important;align-items:center !important;justify-content:space-between !important;border-top:1px solid ' + C.borderSubtle + ' !important;">';
    h += '<span style="font-size:10px !important;color:' + trendColor + ' !important;font-weight:600 !important;">' + trendArrow + ' ' + trendLabel + ' (now ' + latest + '/100)</span>';
    h += '<span style="font-size:10px !important;color:' + C.textMuted + ' !important;">Range: ' + minScore + '\u2013' + maxScore + '</span>';
    h += '</div>';
    h += '</div>';
    return h;
  }

  function formatChatText(text) {
    /* Basic markdown: **bold**, *italic*, \n→<br>, - list items */
    var s = esc(text);
    s = s.replace(/\*\*([^*]+)\*\*/g, '<strong style="color:inherit !important;">$1</strong>');
    s = s.replace(/\*([^*]+)\*/g, '<em>$1</em>');
    s = s.replace(/\n- /g, '<br>&bull; ');
    s = s.replace(/\n/g, '<br>');
    return s;
  }

  function sendChatMessage() {
    var input = document.getElementById("fha-chat-input");
    if (!input || !input.value.trim() || isChatLoading) return;
    var question = input.value.trim();
    input.value = "";

    appendChatMessage("user", question);
    isChatLoading = true;
    renderChatMessages();

    if (!sessionCredentials) {
      isChatLoading = false;
      appendChatMessage("ai", "Session not ready. Please refresh the page.");
      return;
    }

    /* Build vehicle context from last scan */
    var vehicleContext = [];
    if (lastData && lastData.vehicles) {
      var ctxVehicles = filterArchived(lastData.vehicles);
      for (var i = 0; i < ctxVehicles.length; i++) {
        var v = ctxVehicles[i];
        vehicleContext.push({
          deviceId: v.deviceId, deviceName: v.deviceName,
          healthScore: v.healthScore, status: v.status,
          trips: v.trips, distKm: v.distKm,
          lat: v.lat, lon: v.lon,
          isDriving: v.isDriving, isComms: v.isComms,
          exceptions: v.exceptions, faults: v.faults
        });
      }
    }

    var payload = {
      question: question,
      session: sessionCredentials,
      database: currentDb,
      vehicleContext: vehicleContext,
      timezone: "Australia/Brisbane",
      utcOffset: "+10:00",
      currentTime: new Date().toISOString(),
      currentLocalTime: (function () {
        try { return new Date().toLocaleString("en-AU", { timeZone: "Australia/Brisbane", year: "numeric", month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false }); }
        catch (e) { return new Date().toISOString(); }
      })(),
      scanTimestamp: (lastData && lastData.scannedAt) ? lastData.scannedAt : null
    };

    var xhr = new XMLHttpRequest();
    xhr.open("POST", askWebhookBase, true);
    xhr.setRequestHeader("Content-Type", "application/json");
    xhr.timeout = 60000;
    xhr.onload = function () {
      isChatLoading = false;
      if (xhr.status >= 200 && xhr.status < 300) {
        try {
          var resp = JSON.parse(xhr.responseText);
          appendChatMessage("ai", resp.answer || "No answer received.", {
            highlights: resp.highlights || [],
            followUp: resp.followUp || "",
            source: resp.source || ""
          });
        } catch (e) {
          appendChatMessage("ai", "Received a response but couldn\u0027t parse it.");
        }
      } else {
        appendChatMessage("ai", "Sorry, I couldn\u0027t reach the fleet query service (status " + xhr.status + "). Try again in a moment.");
      }
    };
    xhr.onerror = function () {
      isChatLoading = false;
      appendChatMessage("ai", "Network error. Check that n8n is running.");
    };
    xhr.ontimeout = function () {
      isChatLoading = false;
      appendChatMessage("ai", "The query took too long. Try a simpler question.");
    };
    xhr.send(JSON.stringify(payload));
  }

  /* ── Fetch active (non-archived) device IDs from Geotab API ── */
  function fetchActiveDevices(api) {
    if (!api) return;
    api.call("Get", {
      typeName: "Device",
      resultsLimit: 5000
    }, function (devices) {
      activeDeviceIds = {};
      var now = new Date().toISOString();
      var archivedCount = 0;
      for (var i = 0; i < devices.length; i++) {
        var dev = devices[i];
        var aTo = dev.activeTo || "";
        /* Device is archived if activeTo is a real past date (not a far-future placeholder) */
        var isFarFuture = (aTo.indexOf("2050") !== -1 || aTo.indexOf("9999") !== -1 || aTo.indexOf("2049") !== -1 || aTo === "");
        var isArchived = !isFarFuture && aTo !== "" && aTo < now;
        if (!isArchived) {
          activeDeviceIds[dev.id] = true;
        } else {
          archivedCount++;
          console.log("[FHA] Archived device excluded: " + (dev.name || dev.id) + " (activeTo: " + aTo + ")");
        }
      }
      var activeCount = 0;
      for (var k in activeDeviceIds) { if (activeDeviceIds.hasOwnProperty(k)) activeCount++; }
      console.log("[FHA] Devices: " + activeCount + " active, " + archivedCount + " archived (filtered out)");
      /* Re-render if we already have data to apply the filter */
      if (lastData) render(lastData);
    }, function (err) {
      console.warn("[FHA] Could not fetch active devices:", err);
      /* On failure, set empty object so filter is at least active (shows nothing rather than everything) */
      activeDeviceIds = null;
    });
  }

  /* ── Filter out archived / suspended vehicles ── */
  var ARCHIVED_KEYWORDS = ["archived", "suspended", "decommission", "disposed", "removed",
    "retired", "sold", "written off", "wreck", "scrap", "stolen", "out of service"];
  function filterArchived(vehicles) {
    var filtered = [];
    for (var i = 0; i < vehicles.length; i++) {
      var v = vehicles[i];
      /* Primary check: Geotab active device list (definitive source) */
      if (activeDeviceIds && v.deviceId) {
        if (!activeDeviceIds[v.deviceId]) continue;
      }
      /* Secondary check: keyword-based fallback for device name and group */
      var nameLower = (v.deviceName || "").toLowerCase();
      var groupLower = (v.groupName || "").toLowerCase();
      var keywordMatch = false;
      for (var k = 0; k < ARCHIVED_KEYWORDS.length; k++) {
        if (nameLower.indexOf(ARCHIVED_KEYWORDS[k]) !== -1 || groupLower.indexOf(ARCHIVED_KEYWORDS[k]) !== -1) {
          keywordMatch = true; break;
        }
      }
      if (keywordMatch) continue;
      filtered.push(v);
    }
    return filtered;
  }

  function filterByGroup(vehicles) {
    if (!activeGroupFilter || activeGroupFilter.length === 0) return vehicles;
    var filtered = [];
    for (var i = 0; i < vehicles.length; i++) {
      var vGroups = vehicles[i].groups || [];
      for (var g = 0; g < activeGroupFilter.length; g++) {
        if (vGroups.indexOf(activeGroupFilter[g]) !== -1) {
          filtered.push(vehicles[i]);
          break;
        }
      }
    }
    return filtered;
  }

  /* ── Big Fleet Health Timeline (expanded) ── */
  function buildBigTimeline(history) {
    if (!history || history.length < 1) return '<div style="padding:20px !important;text-align:center !important;color:' + C.textMuted + ' !important;font-size:12px !important;">Run a scan to see fleet health trend</div>';
    var chartW = 600, chartH = 100, padX = 30, padY = 16;
    var pts = [];
    var minScore = 100, maxScore = 0;
    for (var i = 0; i < history.length; i++) {
      var s = history[i].fleetScore || 0;
      if (s < minScore) minScore = s;
      if (s > maxScore) maxScore = s;
    }
    /* Ensure nice range */
    minScore = Math.max(0, minScore - 5);
    maxScore = Math.min(100, maxScore + 5);
    var range = Math.max(maxScore - minScore, 10);
    for (var j = 0; j < history.length; j++) {
      var x = history.length > 1 ? padX + (j / (history.length - 1)) * (chartW - 2 * padX) : chartW / 2;
      var y = padY + (chartH - 2 * padY) - ((history[j].fleetScore - minScore) / range) * (chartH - 2 * padY);
      pts.push(x.toFixed(1) + "," + y.toFixed(1));
    }
    var polyline = pts.join(" ");
    var fillPts = padX + "," + (chartH - padY) + " " + polyline + " " + (chartW - padX) + "," + (chartH - padY);
    var latest = history[history.length - 1].fleetScore;
    var lineColor = latest >= 80 ? C.success : latest >= 60 ? C.warn : C.danger;
    var h = '<div style="padding:8px 12px !important;">';
    h += '<svg width="100%" height="' + chartH + '" viewBox="0 0 ' + chartW + ' ' + chartH + '" preserveAspectRatio="xMidYMid meet" style="display:block !important;">';
    h += '<defs><linearGradient id="fha-big-hg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="' + lineColor + '" stop-opacity="0.2"/><stop offset="100%" stop-color="' + lineColor + '" stop-opacity="0.02"/></linearGradient></defs>';
    /* Y-axis labels */
    h += '<text x="2" y="' + (padY + 4) + '" style="font-size:8px;fill:' + C.textMuted + ';">' + maxScore + '</text>';
    h += '<text x="2" y="' + (chartH - padY + 4) + '" style="font-size:8px;fill:' + C.textMuted + ';">' + minScore + '</text>';
    /* Grid lines */
    h += '<line x1="' + padX + '" y1="' + padY + '" x2="' + (chartW - padX) + '" y2="' + padY + '" stroke="' + C.borderSubtle + '" stroke-width="0.5" stroke-dasharray="3,3"/>';
    h += '<line x1="' + padX + '" y1="' + (chartH - padY) + '" x2="' + (chartW - padX) + '" y2="' + (chartH - padY) + '" stroke="' + C.borderSubtle + '" stroke-width="0.5" stroke-dasharray="3,3"/>';
    h += '<polygon points="' + fillPts + '" fill="url(#fha-big-hg)" />';
    h += '<polyline points="' + polyline + '" fill="none" stroke="' + lineColor + '" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />';
    /* Data points */
    for (var k = 0; k < pts.length; k++) {
      var pp = pts[k].split(",");
      h += '<circle cx="' + pp[0] + '" cy="' + pp[1] + '" r="3.5" fill="' + lineColor + '" stroke="white" stroke-width="1.5" />';
    }
    h += '</svg>';
    /* Summary row */
    var prev = history.length > 1 ? history[history.length - 2].fleetScore : latest;
    var trendArrow = latest > prev ? "\u25B2" : latest < prev ? "\u25BC" : "\u25CF";
    var trendLabel = latest > prev ? "Improving" : latest < prev ? "Declining" : "Stable";
    var trendColor = latest >= prev ? C.success : C.danger;
    h += '<div style="display:flex !important;align-items:center !important;justify-content:space-between !important;padding:4px 0 0 0 !important;">';
    h += '<span style="font-size:11px !important;color:' + trendColor + ' !important;font-weight:600 !important;">' + trendArrow + ' ' + trendLabel + ' \u2014 ' + latest + '/100</span>';
    h += '<span style="font-size:10px !important;color:' + C.textMuted + ' !important;">' + history.length + ' scans</span>';
    h += '</div></div>';
    return h;
  }

  /* ── Score Distribution horizontal bars ── */
  function buildScoreDistribution(vehicles) {
    var buckets = [
      { label: "90-100", min: 90, max: 100, color: C.success, count: 0 },
      { label: "80-89", min: 80, max: 89, color: "#4ade80", count: 0 },
      { label: "70-79", min: 70, max: 79, color: C.warn, count: 0 },
      { label: "60-69", min: 60, max: 69, color: "#fb923c", count: 0 },
      { label: "< 60", min: 0, max: 59, color: C.danger, count: 0 }
    ];
    var total = vehicles.length || 1;
    for (var i = 0; i < vehicles.length; i++) {
      var sc = vehicles[i].healthScore || 0;
      for (var b = 0; b < buckets.length; b++) {
        if (sc >= buckets[b].min && sc <= buckets[b].max) { buckets[b].count++; break; }
      }
    }
    var maxCount = 1;
    for (var m = 0; m < buckets.length; m++) { if (buckets[m].count > maxCount) maxCount = buckets[m].count; }
    var h = '<div style="padding:10px 16px 14px 16px !important;">';
    for (var j = 0; j < buckets.length; j++) {
      var pct = Math.round((buckets[j].count / total) * 100);
      var barW = Math.max(2, Math.round((buckets[j].count / maxCount) * 100));
      h += '<div style="display:flex !important;align-items:center !important;gap:8px !important;margin:0 0 6px 0 !important;">';
      h += '<span style="font-size:11px !important;color:' + C.textSecondary + ' !important;width:42px !important;text-align:right !important;flex-shrink:0 !important;">' + buckets[j].label + '</span>';
      h += '<div style="flex:1 !important;height:18px !important;background:' + C.bgSecondary + ' !important;border-radius:3px !important;overflow:hidden !important;position:relative !important;">';
      h += '<div style="height:100% !important;width:' + barW + '% !important;background:' + buckets[j].color + ' !important;border-radius:3px !important;transition:width 0.4s ease !important;"></div>';
      h += '</div>';
      h += '<span style="font-size:11px !important;font-weight:600 !important;color:' + C.textPrimary + ' !important;width:50px !important;flex-shrink:0 !important;">' + buckets[j].count + ' <span style="font-weight:400 !important;color:' + C.textMuted + ' !important;">(' + pct + '%)</span></span>';
      h += '</div>';
    }
    h += '</div>';
    return h;
  }

  /* ── Exception Counts by Rule ── */
  function buildExceptionsByRule(vehicles) {
    var rules = [
      { key: "speeding", label: "Speeding", color: C.danger },
      { key: "seatbelt", label: "Seatbelt", color: C.danger },
      { key: "braking", label: "Harsh braking", color: C.warn },
      { key: "cornering", label: "Harsh cornering", color: C.warn },
      { key: "accel", label: "Harsh acceleration", color: C.warn },
      { key: "engineLight", label: "Engine light", color: "#9333ea" },
      { key: "engineFault", label: "Engine fault", color: "#9333ea" }
    ];
    var maxVal = 1;
    for (var i = 0; i < rules.length; i++) {
      rules[i].total = 0;
      for (var j = 0; j < vehicles.length; j++) {
        var ex = vehicles[j].exceptions || {};
        rules[i].total += (ex[rules[i].key] || 0);
      }
      if (rules[i].total > maxVal) maxVal = rules[i].total;
    }
    /* Sort by count descending */
    rules.sort(function (a, b) { return b.total - a.total; });
    /* Filter out zero-count rules */
    var active = [];
    for (var f = 0; f < rules.length; f++) { if (rules[f].total > 0) active.push(rules[f]); }
    if (active.length === 0) return '<div style="padding:16px !important;text-align:center !important;color:' + C.textMuted + ' !important;font-size:12px !important;">No exceptions detected</div>';
    var h = '<div style="padding:10px 16px 14px 16px !important;">';
    for (var k = 0; k < active.length; k++) {
      var barW = Math.max(2, Math.round((active[k].total / maxVal) * 100));
      h += '<div style="display:flex !important;align-items:center !important;gap:8px !important;margin:0 0 6px 0 !important;">';
      h += '<span style="font-size:11px !important;color:' + C.textSecondary + ' !important;width:100px !important;text-align:right !important;flex-shrink:0 !important;">' + active[k].label + '</span>';
      h += '<div style="flex:1 !important;height:18px !important;background:' + C.bgSecondary + ' !important;border-radius:3px !important;overflow:hidden !important;">';
      h += '<div style="height:100% !important;width:' + barW + '% !important;background:' + active[k].color + ' !important;border-radius:3px !important;transition:width 0.4s ease !important;"></div>';
      h += '</div>';
      h += '<span style="font-size:12px !important;font-weight:600 !important;color:' + C.textPrimary + ' !important;width:36px !important;flex-shrink:0 !important;">' + active[k].total + '</span>';
      h += '</div>';
    }
    h += '</div>';
    return h;
  }

  /* ── Top 5 Worst Vehicles ── */
  function buildWorstVehicles(vehicles) {
    var sorted = vehicles.slice().sort(function (a, b) { return (a.healthScore || 0) - (b.healthScore || 0); });
    var worst = sorted.slice(0, 5);
    if (worst.length === 0) return '<div style="padding:16px !important;text-align:center !important;color:' + C.textMuted + ' !important;font-size:12px !important;">All vehicles healthy</div>';
    var h = '<div style="padding:6px 0 !important;">';
    for (var i = 0; i < worst.length; i++) {
      var w = worst[i];

      var barColor = sc >= 80 ? C.success : sc >= 60 ? C.warn : C.danger;
      h += '<div style="display:flex !important;align-items:center !important;gap:10px !important;padding:8px 16px !important;border-bottom:1px solid ' + C.borderSubtle + ' !important;">';
      h += '<span style="font-size:11px !important;font-weight:700 !important;color:' + C.textMuted + ' !important;width:16px !important;">' + (i + 1) + '</span>';
      h += '<div style="flex:1 !important;min-width:0 !important;">';
      h += '<div style="font-size:12px !important;font-weight:500 !important;color:' + C.textPrimary + ' !important;white-space:nowrap !important;overflow:hidden !important;text-overflow:ellipsis !important;">' + esc(w.deviceName) + '</div>';
      /* Micro bar */
      h += '<div style="height:4px !important;background:' + C.bgSecondary + ' !important;border-radius:2px !important;margin:3px 0 0 0 !important;overflow:hidden !important;">';
      h += '<div style="height:100% !important;width:' + sc + '% !important;background:' + barColor + ' !important;border-radius:2px !important;"></div></div>';
      h += '</div>';
      h += miniScore(sc);
      h += '</div>';
    }
    h += '</div>';
    return h;
  }

  /* ── Drill-down action card ── */
  /* ── Predictive Risk Analysis ── */
  function buildPredictiveRisk(vehicles) {
    if (!vehicles || vehicles.length === 0) return '<div style="padding:16px !important;text-align:center !important;color:' + C.textMuted + ' !important;font-size:12px !important;">No vehicle data available</div>';

    /* Calculate risk score per vehicle based on weighted exception patterns */
    var riskVehicles = [];
    for (var i = 0; i < vehicles.length; i++) {
      var v = vehicles[i];
      var ex = v.exceptions || {};
      var f = v.faults || {};
      /* Weighted risk factors — mechanical issues carry highest risk */
      var mechRisk = ((ex.engineLight || 0) * 25) + ((ex.engineFault || 0) * 25) + ((f.critical || 0) * 30) + ((f.active || 0) * 20) + ((ex.collision || 0) * 40);
      /* Driver behaviour risk — cumulative pattern indicates growing risk */
      var driverRisk = ((ex.speeding || 0) * 8) + ((ex.seatbelt || 0) * 10) + ((ex.braking || 0) * 5) + ((ex.cornering || 0) * 5) + ((ex.accel || 0) * 4);
      /* Total exceptions as volume indicator */
      var totalExc = (ex.speeding || 0) + (ex.seatbelt || 0) + (ex.braking || 0) + (ex.cornering || 0) + (ex.accel || 0) + (ex.engineLight || 0) + (ex.engineFault || 0);
      /* Health deficit — how far from perfect */
      var healthDeficit = Math.max(0, 100 - (v.healthScore || 100));
      /* Composite risk score (0-100) */
      var riskScore = Math.min(100, Math.round(mechRisk + driverRisk + (healthDeficit * 0.5)));
      /* Determine risk level and projected intervention */
      var riskLevel, riskColor, riskBg, riskBorder, daysEstimate;
      if (riskScore >= 60) {
        riskLevel = "High"; riskColor = C.dangerDark; riskBg = C.dangerBg; riskBorder = C.dangerBorder;
        daysEstimate = "1\u20133 days";
      } else if (riskScore >= 30) {
        riskLevel = "Medium"; riskColor = C.warnDark; riskBg = C.warnBg; riskBorder = C.warnBorder;
        daysEstimate = "1\u20132 weeks";
      } else if (riskScore > 0) {
        riskLevel = "Low"; riskColor = C.blue; riskBg = C.blueLight; riskBorder = C.borderLight;
        daysEstimate = "2\u20134 weeks";
      } else {
        riskLevel = "Minimal"; riskColor = C.successDark; riskBg = C.successBg; riskBorder = C.successBorder;
        daysEstimate = "No action needed";
      }
      if (riskScore > 0) {
        riskVehicles.push({
          name: v.deviceName, score: riskScore, level: riskLevel,
          color: riskColor, bg: riskBg, border: riskBorder,
          days: daysEstimate, totalExc: totalExc, mechRisk: mechRisk,
          driverRisk: driverRisk, healthScore: v.healthScore || 0
        });
      }
    }
    /* Sort highest risk first */
    riskVehicles.sort(function (a, b) { return b.score - a.score; });

    /* Fleet risk summary */
    var highCount = 0, medCount = 0, lowCount = 0;
    for (var r = 0; r < riskVehicles.length; r++) {
      if (riskVehicles[r].level === "High") highCount++;
      else if (riskVehicles[r].level === "Medium") medCount++;
      else lowCount++;
    }

    var h = '<div style="padding:10px 16px 6px 16px !important;">';
    /* Risk summary pills */
    h += '<div style="display:flex !important;gap:8px !important;margin:0 0 10px 0 !important;">';
    if (highCount > 0) {
      h += '<div style="flex:1 !important;padding:8px 10px !important;background:' + C.dangerBg + ' !important;border:1px solid ' + C.dangerBorder + ' !important;border-radius:' + C.radius + ' !important;text-align:center !important;">';
      h += '<div style="font-size:18px !important;font-weight:700 !important;color:' + C.dangerDark + ' !important;">' + highCount + '</div>';
      h += '<div style="font-size:10px !important;color:' + C.dangerDark + ' !important;">High risk</div></div>';
    }
    if (medCount > 0) {
      h += '<div style="flex:1 !important;padding:8px 10px !important;background:' + C.warnBg + ' !important;border:1px solid ' + C.warnBorder + ' !important;border-radius:' + C.radius + ' !important;text-align:center !important;">';
      h += '<div style="font-size:18px !important;font-weight:700 !important;color:' + C.warnDark + ' !important;">' + medCount + '</div>';
      h += '<div style="font-size:10px !important;color:' + C.warnDark + ' !important;">Medium risk</div></div>';
    }
    if (lowCount > 0) {
      h += '<div style="flex:1 !important;padding:8px 10px !important;background:' + C.blueLight + ' !important;border:1px solid ' + C.borderLight + ' !important;border-radius:' + C.radius + ' !important;text-align:center !important;">';
      h += '<div style="font-size:18px !important;font-weight:700 !important;color:' + C.blue + ' !important;">' + lowCount + '</div>';
      h += '<div style="font-size:10px !important;color:' + C.blue + ' !important;">Low risk</div></div>';
    }
    if (riskVehicles.length === 0) {
      h += '<div style="flex:1 !important;padding:8px 10px !important;background:' + C.successBg + ' !important;border:1px solid ' + C.successBorder + ' !important;border-radius:' + C.radius + ' !important;text-align:center !important;">';
      h += '<div style="font-size:14px !important;font-weight:600 !important;color:' + C.successDark + ' !important;">All clear</div>';
      h += '<div style="font-size:10px !important;color:' + C.successDark + ' !important;">No predicted interventions</div></div>';
    }
    h += '</div>';

    /* Vehicle risk list (top 8) */
    var showCount = Math.min(riskVehicles.length, 8);
    for (var k = 0; k < showCount; k++) {
      var rv = riskVehicles[k];
      h += '<div style="display:flex !important;align-items:center !important;gap:8px !important;padding:7px 0 !important;border-bottom:1px solid ' + C.borderSubtle + ' !important;">';
      /* Risk indicator dot */
      h += '<div style="width:8px !important;height:8px !important;border-radius:50% !important;background:' + rv.color + ' !important;flex-shrink:0 !important;"></div>';
      /* Vehicle name */
      h += '<div style="flex:1 !important;min-width:0 !important;">';
      h += '<div style="font-size:11px !important;font-weight:500 !important;color:' + C.textPrimary + ' !important;white-space:nowrap !important;overflow:hidden !important;text-overflow:ellipsis !important;">' + esc(rv.name) + '</div>';
      h += '<div style="font-size:10px !important;color:' + C.textMuted + ' !important;">' + rv.totalExc + ' exceptions \u2022 Health ' + rv.healthScore + '/100</div>';
      h += '</div>';
      /* Risk level + ETA */
      h += '<div style="text-align:right !important;flex-shrink:0 !important;">';
      h += '<span style="display:inline-block !important;padding:2px 6px !important;border-radius:3px !important;background:' + rv.bg + ' !important;border:1px solid ' + rv.border + ' !important;font-size:10px !important;font-weight:600 !important;color:' + rv.color + ' !important;">' + rv.level + '</span>';
      h += '<div style="font-size:9px !important;color:' + C.textMuted + ' !important;margin:2px 0 0 0 !important;">Est. ' + rv.days + '</div>';
      h += '</div></div>';
    }
    if (riskVehicles.length > showCount) {
      h += '<div style="font-size:10px !important;color:' + C.textMuted + ' !important;text-align:center !important;padding:6px 0 !important;">+' + (riskVehicles.length - showCount) + ' more vehicles with risk factors</div>';
    }
    h += '</div>';
    return h;
  }

  function buildDrillCard(label, count, color, bgColor, borderColor, iconSvg, viewId) {

  function render(data) {
    if (gameTimer) { clearInterval(gameTimer); gameTimer = null; }
    var fleet = data.fleetSummary || {};
    var allVehicles = filterArchived(data.vehicles || []);
    var vehicles = filterByGroup(allVehicles);
    var insight = data.fleetInsight || "";
    /* Recalculate fleet stats for filtered set */
    var filteredCount = vehicles.length;
    var critCount = 0, warnCount = 0, healthCount = 0;
    var scoreSum = 0;
    for (var si = 0; si < vehicles.length; si++) {
      scoreSum += (vehicles[si].healthScore || 0);
      if (vehicles[si].status === "critical") critCount++;
      else if (vehicles[si].status === "warning") warnCount++;
      else healthCount++;
    }
    var score = filteredCount > 0 ? Math.round(scoreSum / filteredCount) : 100;
    /* Build scanHistory entry from this scan */
    var vehicleScoresArr = [];
    for (var vh = 0; vh < vehicles.length; vh++) {
      vehicleScoresArr.push({ name: vehicles[vh].deviceName || "", score: vehicles[vh].healthScore || 0 });
    }
    /* Only push if this looks like a fresh scan (not a re-render of old data) */
    var scanTs = data.scannedAt || data.timestamp || new Date().toISOString();
    var isDuplicate = scanHistory.length > 0 && scanHistory[scanHistory.length - 1].ts === scanTs;
    if (!isDuplicate) {
      scanHistory.push({ ts: scanTs, fleetScore: score, vehicleScores: vehicleScoresArr });
      /* Cap at 50 entries */
      if (scanHistory.length > 50) scanHistory.shift();
    }
    var mechV = [], driverV = [], healthyV = [];
    for (var i = 0; i < vehicles.length; i++) {
      var v = vehicles[i];
      if (v.status === "healthy") healthyV.push(v);
      else if (isMech(v)) mechV.push(v);
      else driverV.push(v);
    }
    var allMechOk = (mechV.length === 0);

    /* Sort flagged vehicles by score ascending (worst first) */
    mechV.sort(function (a, b) { return (a.healthScore || 0) - (b.healthScore || 0); });
    driverV.sort(function (a, b) { return (a.healthScore || 0) - (b.healthScore || 0); });
    /* Sort healthy by score ascending so borderline vehicles show first */
    healthyV.sort(function (a, b) { return (a.healthScore || 100) - (b.healthScore || 100); });

    var h = '<div style="padding:16px 20px !important;font-family:Roboto,\'Segoe UI\',Segoe,\'Helvetica Neue\',Helvetica,sans-serif !important;">';

    h += '</div>';
    /* Center: actions */
    h += '<div style="display:flex !important;align-items:center !important;gap:6px !important;margin:0 0 0 12px !important;">';
    h += '<button id="fha-refresh-btn" style="' + btnStyle("secondary") + 'font-size:11px !important;padding:5px 10px !important;">&#8635; Scan Again</button>';
    h += '<button id="fha-riskmap-btn" style="' + btnStyle("secondary") + 'font-size:11px !important;padding:5px 10px !important;">';
    h += '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-1px !important;margin:0 3px 0 0 !important;"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6" opacity="0.5"/><circle cx="12" cy="12" r="2"/></svg>';
    h += 'Risk Map</button>';

    /* Right: spacer + email settings + gauge */

    h += '<div style="flex-shrink:0 !important;">' + buildGaugeSVG(score, 48) + '</div>';
    h += '</div></div>';
    h += '<div id="fha-settings-panel" style="display:none !important;">' + buildSettingsPanel() + '</div>';

    /* Stats strip */
    h += '<div style="display:flex !important;align-items:center !important;gap:16px !important;padding:8px 16px !important;background:' + C.bgMain + ' !important;border:1px solid ' + C.borderLight + ' !important;border-radius:' + C.radius + ' !important;margin:0 0 4px 0 !important;">';
    var vehicleCountLabel = (activeGroupFilter.length > 0 && filteredCount < allVehicles.length)
      ? (filteredCount + ' of ' + allVehicles.length)

  /* ── Bind result page ── */
  /* ── View switching (exposed to window for onclick) ── */
  window._fhaSetView = function (view) {
    currentView = view || "dashboard";
    if (lastData) render(lastData);
  };

  function bindResults() {
    var rb = document.getElementById("fha-refresh-btn");
    if (rb) rb.onclick = function () { triggerScan(false); return false; };
    var rmb = document.getElementById("fha-riskmap-btn");
    if (rmb) rmb.onclick = function () { showRiskMap(); return false; };
    var bb = document.getElementById("fha-back-btn");
    if (bb) bb.onclick = function () { window._fhaSetView("dashboard"); return false; };
    bindSettingsToggle();
    bindCollapseSections();
    bindSearch();
    bindChatEvents();
  }

  /* ── Collapsible section toggle ── */
  function bindCollapseSections() {
    var sections = ["mech", "driver", "healthy", "coaching"];
    for (var i = 0; i < sections.length; i++) {
      (function (sid) {
        var header = document.getElementById("fha-sh-" + sid);
        if (!header) return;
        header.onclick = function () {
          var content = document.getElementById("fha-sec-" + sid);
          var chevron = document.getElementById("fha-chev-" + sid);
          if (!content) return;
          var isHidden = content.style.display === "none";
          content.style.cssText = isHidden ? "display:block !important;" : "display:none !important;";
          if (chevron) chevron.textContent = isHidden ? "\u25BC" : "\u25B6";
          return false;
        };
      })(sections[i]);
    }
  }

  /* ── Vehicle search filter ── */
  function bindSearch() {
    var input = document.getElementById("fha-search");
    if (!input) return;
    input.oninput = function () {
      var q = (input.value || "").toLowerCase().trim();
      /* Filter card-style vehicles */
      var cards = document.querySelectorAll(".fha-vcard");
      for (var i = 0; i < cards.length; i++) {
        var name = cards[i].getAttribute("data-name") || "";
        cards[i].style.cssText = (!q || name.indexOf(q) !== -1) ? "display:block !important;" : "display:none !important;";
      }
      /* Filter healthy table rows */
      var rows = document.querySelectorAll(".fha-vrow");
      for (var j = 0; j < rows.length; j++) {
        var rn = rows[j].getAttribute("data-name") || "";
        rows[j].style.cssText = (!q || rn.indexOf(q) !== -1) ? "display:table-row !important;border-top:1px solid " + C.borderSubtle + " !important;" : "display:none !important;";
      }
      /* If searching, expand all sections so results are visible */
      if (q) {
        var secs = ["mech", "driver", "healthy"];
        for (var k = 0; k < secs.length; k++) {
          var sec = document.getElementById("fha-sec-" + secs[k]);
          var chev = document.getElementById("fha-chev-" + secs[k]);
          if (sec) sec.style.cssText = "display:block !important;";
          if (chev) chev.textContent = "\u25BC";
        }
      }
    };
  }

  function bindSettingsToggle() {
    var sb = document.getElementById("fha-settings-btn");
    if (sb) sb.onclick = function () {
      var p = document.getElementById("fha-settings-panel");
      if (p) {
        showSettingsFlag = !showSettingsFlag;
        p.style.cssText = showSettingsFlag ? "display:block !important;" : "display:none !important;";
        if (showSettingsFlag) bindSettingsEvents();
      }
      return false;
    };
  }

  /* ── Recipient pill management ── */
  function addRecipient(email) {
    email = email.toLowerCase().trim();
    for (var i = 0; i < emailConfig.additionalRecipients.length; i++) {
      if (emailConfig.additionalRecipients[i] === email) return;
    }
    emailConfig.additionalRecipients.push(email);
    renderRecipientPills();
  }

  function removeRecipient(email) {
    var arr = [];
    for (var i = 0; i < emailConfig.additionalRecipients.length; i++) {
      if (emailConfig.additionalRecipients[i] !== email) arr.push(emailConfig.additionalRecipients[i]);
    }
    emailConfig.additionalRecipients = arr;
    renderRecipientPills();
  }

  function renderRecipientPills() {
    var container = document.getElementById("fha-recipients-list");
    if (!container) return;

  /* ── Send email ── */
  function sendEmailTo(email) {
    var btn = document.getElementById("fha-send-me");
    if (btn) { btn.textContent = "Sending\u2026"; btn.style.opacity = "0.6"; btn.style.cursor = "wait"; }
    if (!sessionCredentials) return;
    var recipients = email || getAllRecipients();
    var payload = {
      session: sessionCredentials,
      database: currentDb,
      forceEmail: true,
      emailTo: recipients
    };
    var effectiveGroups = getEffectiveGroupIds();
    if (effectiveGroups) {
      payload.groupId = effectiveGroups;
      payload.groupName = getEffectiveGroupLabel();
    }
    var xhr = new XMLHttpRequest();
    xhr.open("POST", webhookBase, true);
    xhr.setRequestHeader("Content-Type", "application/json");
    xhr.setRequestHeader("Accept", "application/json");
    xhr.timeout = 120000;
    xhr.onload = function () {
      var nb = document.getElementById("fha-send-me");
      if (xhr.status >= 200 && xhr.status < 300) {
        try { var data = JSON.parse(xhr.responseText); lastData = data; render(data); } catch (e) {}
        if (nb) {
          nb.textContent = "\u2713 Email Sent!";
          nb.style.background = C.success; nb.style.borderColor = C.success; nb.style.opacity = "1";
          setTimeout(function () { var b = document.getElementById("fha-send-me"); if (b) { b.textContent = "Send Report"; b.setAttribute("style", btnStyle("primary") + "font-size:11px !important;padding:5px 12px !important;white-space:nowrap !important;"); } }, 3000);
        }
      } else {
        if (nb) { nb.textContent = "Failed"; nb.style.background = C.danger; nb.style.borderColor = C.danger; nb.style.opacity = "1";
          setTimeout(function () { var b = document.getElementById("fha-send-me"); if (b) { b.textContent = "Send Report"; b.setAttribute("style", btnStyle("primary") + "font-size:11px !important;padding:5px 12px !important;white-space:nowrap !important;"); } }, 2000);
        }
      }
    };
    xhr.onerror = function () {
      var nb = document.getElementById("fha-send-me");
      if (nb) { nb.textContent = "Error"; nb.style.background = C.danger; nb.style.opacity = "1";
        setTimeout(function () { var b = document.getElementById("fha-send-me"); if (b) { b.textContent = "Send Report"; b.setAttribute("style", btnStyle("primary") + "font-size:11px !important;padding:5px 12px !important;white-space:nowrap !important;"); } }, 2000);
      }
    };
    xhr.send(JSON.stringify(payload));
  }

  /* ── Trigger scan ── */
  function triggerScan(withEmail) {
    if (isLoading) return;
    if (!webhookBase) { showSetup(); return; }
    if (!sessionCredentials) { showError("Session not ready. Please refresh the page."); return; }
    isLoading = true;
    showLoading();
    /* Build POST payload with session credentials */
    var payload = {
      session: sessionCredentials,
      database: currentDb
    };
    if (withEmail) {
      payload.forceEmail = true;
      payload.emailTo = getAllRecipients();
      var effectiveGroups = getEffectiveGroupIds();
      if (effectiveGroups) {
        payload.groupId = effectiveGroups;
        payload.groupName = getEffectiveGroupLabel();
      }
    }
    var xhr = new XMLHttpRequest();
    xhr.open("POST", webhookBase, true);
    xhr.setRequestHeader("Content-Type", "application/json");
    xhr.setRequestHeader("Accept", "application/json");
    xhr.timeout = 120000;
    xhr.onload = function () {
      isLoading = false;
      if (xhr.status >= 200 && xhr.status < 300) {
        try { var data = JSON.parse(xhr.responseText); lastData = data; render(data); }
        catch (e) { showError("Invalid response: " + e.message); }
      } else { showError("Scanner returned status " + xhr.status); }
    };
    xhr.onerror = function () { isLoading = false; showError("Network error. Check n8n is running."); };
    xhr.ontimeout = function () { isLoading = false; showError("Scan timed out after 120s."); };
    xhr.send(JSON.stringify(payload));
  }

  /* ── Fetch Geotab users ── */
  function fetchGeotabUsers(api) {
    try {
      api.call("Get", { typeName: "User" }, function (users) {
        geotabUsers = [];
        for (var i = 0; i < users.length; i++) {
          var u = users[i];
          if (u.name && u.name.indexOf("@") !== -1) {
            geotabUsers.push({
              email: u.name,
              firstName: u.firstName || "",
              lastName: u.lastName || "",
              displayName: (u.firstName || "") + " " + (u.lastName || "")
            });
          }
        }
        /* Try to find current user's first name */
        for (var j = 0; j < geotabUsers.length; j++) {
          if (geotabUsers[j].email.toLowerCase() === currentUserEmail.toLowerCase()) {
            currentFirstName = geotabUsers[j].firstName || currentUserName;
            break;
          }
        }
        /* Sort alphabetically by display name */
        geotabUsers.sort(function (a, b) { return a.displayName.localeCompare(b.displayName); });
      }, function () { /* API call failed, use fallback */ });
    } catch (e) { /* Not a real Geotab API */ }
  }

  /* ── Fetch Geotab groups ── */
  function fetchGeotabGroups(api) {
    try {
      api.call("Get", { typeName: "Group" }, function (groups) {
        geotabGroups = [];
        /* System group IDs to exclude */
        var sysIds = {
          "GroupCompanyId": true, "GroupRootId": true, "GroupNothingId": true,
          "GroupSecurityId": true, "GroupPrivateUserId": true, "GroupDriveUserId": true,
          "GroupDefectsId": true, "GroupTrailerId": true, "GroupAssetTypeId": true,
          "GroupVehicleId": true, "GroupPersonalGroupId": true, "GroupEVBatteryHealthId": true
        };
        for (var i = 0; i < groups.length; i++) {
          var g = groups[i];
          var gid = g.id || "";
          /* Skip system/root groups */
          if (sysIds[gid]) continue;
          /* Skip groups with no name or placeholder names */
          if (!g.name || g.name === "**Org**") continue;
          geotabGroups.push({
            id: gid,
            name: g.name || gid,
            parentId: (g.parent && g.parent.id) ? g.parent.id : ""
          });
        }
        /* Sort alphabetically */
        geotabGroups.sort(function (a, b) { return a.name.localeCompare(b.name); });
      }, function () { /* Group fetch failed */ });
    } catch (e) { /* Not a real Geotab API */ }
  }

  /* ── Build all recipients for webhook ── */
  function getAllRecipients() {
    var primary = emailConfig.recipient || currentUserEmail;
    var all = [primary];
    for (var i = 0; i < emailConfig.additionalRecipients.length; i++) {
      var em = emailConfig.additionalRecipients[i];
      if (em && em !== primary) all.push(em);
    }
    return all.join(",");
  }

  /* ── Read MyGeotab global group filter from state ── */
  function readGroupFilter(state) {
    try {
      var groups = state.getGroupFilter();
      activeGroupFilter = [];
      activeGroupNames = [];
      groupFilterWasRead = true;
      if (groups && groups.length > 0) {
        for (var i = 0; i < groups.length; i++) {
          var gid = (typeof groups[i] === "object") ? (groups[i].id || "") : (groups[i] || "");
          if (gid && gid !== "GroupCompanyId") {
            activeGroupFilter.push(gid);
            /* Resolve name from fetched groups */
            var name = gid;
            for (var j = 0; j < geotabGroups.length; j++) {
              if (geotabGroups[j].id === gid) { name = geotabGroups[j].name; break; }
            }
            activeGroupNames.push(name);
          }
        }
      }
    } catch (e) { /* state.getGroupFilter not available (standalone mode) */ }
  }

  /* ── Get effective group IDs for webhook ── */
  function getEffectiveGroupIds() {
    /* If MyGeotab filter was read: use it (even if empty = all vehicles) */
    if (groupFilterWasRead) {
      if (activeGroupFilter.length > 0) return activeGroupFilter.join(",");
      return "";
    }
    /* Standalone mode: fall back to custom settings picker */
    if (emailConfig.reportGroupId) return emailConfig.reportGroupId;
    return "";
  }

  function getEffectiveGroupLabel() {
    if (groupFilterWasRead) {
      if (activeGroupNames.length > 0) return activeGroupNames.join(", ");
      return "All vehicles";
    }
    if (emailConfig.reportGroupName) return emailConfig.reportGroupName;
    return "All vehicles";
  }

  function getMapDateRange() {
    var now = new Date();
    var from, to;
    if (mapDateRange === "today") {
      from = new Date(now.getFullYear(), now.getMonth(), now.getDate()); to = now;
    } else if (mapDateRange === "week") {
      to = now; from = new Date(to.getTime() - 7 * 86400000);
    } else if (mapDateRange === "month") {
      to = now; from = new Date(to.getTime() - 30 * 86400000);
    } else {
      var y = new Date(now.getTime() - 86400000);
      from = new Date(y.getFullYear(), y.getMonth(), y.getDate());
      to = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    }
    return { from: from.toISOString(), to: to.toISOString() };
  }

  function fetchRules(cb) {
    if (cachedRules) { cb(cachedRules); return; }
    storedApi.call("Get", { typeName: "Rule", resultsLimit: 300 }, function (rules) {
      cachedRules = rules || []; cb(cachedRules);
    }, function () { cb([]); });
  }

  function fetchDeviceNames(deviceIds, cb) {
    var missing = [];
    for (var i = 0; i < deviceIds.length; i++) {
      if (!cachedDeviceNames[deviceIds[i]]) missing.push(deviceIds[i]);
    }
    if (missing.length === 0) { cb(); return; }
    var idx = 0;
    function next() {
      if (idx >= missing.length) { cb(); return; }
      var did = missing[idx]; idx++;
      storedApi.call("Get", { typeName: "Device", search: { id: did }, resultsLimit: 1 }, function (devs) {
        if (devs && devs.length > 0) cachedDeviceNames[did] = devs[0].name || did;
        else cachedDeviceNames[did] = did;
        next();
      }, function () { cachedDeviceNames[did] = did; next(); });
    }
    next();
  }
