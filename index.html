        document.getElementById("fha-map-loading").innerHTML = '<div style="font-size:12px;color:' + C.dangerDark + ';">Could not load map library.</div>';
        return;
      }
      initLeafletMap();
      fetchRules(function (rules) { populateRuleSelector(rules); });
    });
  }

  function hideRiskMap() {
    mapViewActive = false;
    elMap.style.display = "none";
    document.getElementById("fha-root").style.display = "block";
  }

  function createClusterIcon(cluster) {
    var count = cluster.getChildCount();
    var size = "sm", px = 32;
    if (count >= 100) { size = "lg"; px = 48; }
    else if (count >= 20) { size = "md"; px = 40; }
    return L.divIcon({
      html: '<div class="fha-cluster fha-cluster-' + size + '">' + count + '</div>',
      className: '',
      iconSize: L.point(px, px)
    });
  }

  function initLeafletMap() {
    if (mapInstance) { try { mapInstance.remove(); } catch (e) {} mapInstance = null; }
    var loadEl = document.getElementById("fha-map-loading");
    if (loadEl) loadEl.style.display = "none";
    mapInstance = L.map("fha-map-container", { center: [-27.47, 153.02], zoom: 10, zoomControl: true });
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "\u00A9 OpenStreetMap", maxZoom: 18
    }).addTo(mapInstance);
    if (window.L && L.markerClusterGroup) {
      mapMarkersLayer = L.markerClusterGroup({
        iconCreateFunction: createClusterIcon,
        maxClusterRadius: 50,
        spiderfyOnMaxZoom: false,
        showCoverageOnHover: false,
        zoomToBoundsOnClick: false,
        disableClusteringAtZoom: 17
      }).addTo(mapInstance);
      mapMarkersLayer.on("clusterclick", function (ev) {
        var cluster = ev.layer;
        var markers = cluster.getAllChildMarkers();
        var zoom = mapInstance.getZoom();
        var maxZoom = mapInstance.getMaxZoom() || 18;
        /* If not at max zoom and cluster has many children, zoom in first */
        if (zoom < maxZoom - 2 && markers.length > 30) {
          cluster.zoomToBounds({ padding: [40, 40] });
          return;
        }
        /* Build vehicle × rule breakdown from marker data */
        var vehs = {}, vehNames = {}, vehRuleIds = {};
        for (var m = 0; m < markers.length; m++) {
          var md = markers[m]._fhaData;
          if (!md) continue;
          if (!vehs[md.deviceId]) { vehs[md.deviceId] = {}; vehNames[md.deviceId] = md.deviceName; vehRuleIds[md.deviceId] = {}; }
          var rn = md.ruleName || "Unknown";
          vehs[md.deviceId][rn] = (vehs[md.deviceId][rn] || 0) + 1;
          if (md.ruleId) vehRuleIds[md.deviceId][md.ruleId] = true;
        }
        /* Sort vehicles by total event count desc */
        var vArr = [];
        for (var vid in vehs) {
          if (!vehs.hasOwnProperty(vid)) continue;
          var total = 0, rules = vehs[vid];
          for (var rk in rules) { if (rules.hasOwnProperty(rk)) total += rules[rk]; }
          var vRids = [];
          for (var rrid in vehRuleIds[vid]) { if (vehRuleIds[vid].hasOwnProperty(rrid)) vRids.push(rrid); }
          vArr.push({ id: vid, name: vehNames[vid], rules: rules, ruleIds: vRids, total: total });
        }
        vArr.sort(function (a, b) { return b.total - a.total; });
        /* Build popup HTML */
        var maxShow = 8;
        var html = '<div style="font-family:Roboto,sans-serif;min-width:220px;max-width:300px;">';
        html += '<div style="font-size:13px;font-weight:600;color:#1F2833;margin:0 0 6px 0;border-bottom:1px solid #C0CCD8;padding:0 0 6px 0;">';
        html += markers.length + ' exception' + (markers.length !== 1 ? 's' : '') + ' in this area</div>';
        var shown = Math.min(vArr.length, maxShow);
        for (var v = 0; v < shown; v++) {
          var veh = vArr[v];
          html += '<div style="padding:5px 0;' + (v < shown - 1 ? 'border-bottom:1px solid #E8ECF0;' : '') + '">';
          html += '<div style="display:flex;align-items:center;gap:6px;margin:0 0 3px 0;">';
          html += '<a href="' + gtExcLink(veh.id, veh.ruleIds) + '" target="_top" style="font-size:12px;font-weight:600;color:#0078D3;text-decoration:none;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="' + esc(veh.name) + '">' + esc(veh.name) + '</a>';
          html += '<span style="font-size:11px;font-weight:600;color:#1F2833;flex-shrink:0;">' + veh.total + '</span>';
          html += '</div>';
          /* Rule breakdown */
          var rArr = [];
          for (var rr in veh.rules) { if (veh.rules.hasOwnProperty(rr)) rArr.push({ name: rr, count: veh.rules[rr] }); }
          rArr.sort(function (a, b) { return b.count - a.count; });
          for (var ri = 0; ri < rArr.length; ri++) {
            /* Find rule color */
            var rColor = "#556575";
            for (var ac = 0; ac < mapActiveRules.length; ac++) {
              if (mapActiveRules[ac].name === rArr[ri].name) { rColor = mapActiveRules[ac].color; break; }
            }
            html += '<div style="display:flex;align-items:center;gap:5px;padding:1px 0 1px 8px;font-size:11px;color:#556575;">';
            html += '<span style="width:6px;height:6px;border-radius:50%;background:' + rColor + ';flex-shrink:0;"></span>';
            html += '<span style="flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + esc(rArr[ri].name) + '</span>';
            html += '<span style="flex-shrink:0;">' + rArr[ri].count + '</span>';
            html += '</div>';
          }
          html += '</div>';
        }
        if (vArr.length > maxShow) {
          html += '<div style="font-size:10px;color:#556575;padding:4px 0 0 0;text-align:center;">+ ' + (vArr.length - maxShow) + ' more vehicle' + ((vArr.length - maxShow) !== 1 ? 's' : '') + '</div>';
        }
        html += '</div>';
        var latLng = cluster.getLatLng();
        L.popup({ maxWidth: 320, maxHeight: 350, className: "fha-cluster-popup" })
          .setLatLng(latLng)
          .setContent(html)
          .openOn(mapInstance);
      });
    } else {
      mapMarkersLayer = L.layerGroup().addTo(mapInstance);
    }
  }

  function populateRuleSelector(rules) {
    var sel = document.getElementById("fha-map-rule-add");
    if (!sel) return;
    var sorted = [];
    for (var i = 0; i < rules.length; i++) {
      if (rules[i].name) sorted.push(rules[i]);
    }
    sorted.sort(function (a, b) {
      var na = a.name.toLowerCase(), nb = b.name.toLowerCase();
      return na < nb ? -1 : na > nb ? 1 : 0;
    });
    var h = '<option value="">+ Add rule layer\u2026</option>';
    for (var j = 0; j < sorted.length; j++) {
      h += '<option value="' + esc(sorted[j].id) + '" data-name="' + esc(sorted[j].name) + '">' + esc(sorted[j].name) + '</option>';
    }
    sel.innerHTML = h;
    sel.onchange = function () {
      if (!this.value) return;
      var ruleId = this.value;
      var ruleName = this.options[this.selectedIndex].getAttribute("data-name") || ruleId;
      this.value = "";
      /* Check if already added */
      for (var k = 0; k < mapActiveRules.length; k++) {
        if (mapActiveRules[k].id === ruleId) return;
      }
      var colorIdx = mapActiveRules.length % mapRuleColors.length;
      mapActiveRules.push({ id: ruleId, name: ruleName, color: mapRuleColors[colorIdx], visible: true, rawCount: 0, truncated: false });
      renderActiveRulesList();
      loadRuleData(ruleId);
    };
  }

  function renderActiveRulesList() {
    var el = document.getElementById("fha-map-active-rules");
    if (!el) return;
    if (mapActiveRules.length === 0) { el.innerHTML = '<div style="font-size:10px;color:' + C.textMuted + ';padding:4px 0;">No rules selected</div>'; return; }
    var h = '';
    for (var i = 0; i < mapActiveRules.length; i++) {
      var r = mapActiveRules[i];
      h += '<div style="display:flex;align-items:center;gap:6px;padding:3px 0;font-size:11px;" data-ridx="' + i + '">';
      h += '<span style="width:10px;height:10px;border-radius:50%;background:' + r.color + ';flex-shrink:0;opacity:' + (r.visible ? '1' : '0.3') + ';cursor:pointer;" class="fha-rule-toggle"></span>';
      h += '<span style="flex:1;color:' + (r.visible ? C.textPrimary : C.textMuted) + ';white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;" class="fha-rule-toggle" title="' + esc(r.name) + '">' + esc(r.name) + '</span>';
      h += '<span style="color:' + C.textMuted + ';cursor:pointer;font-size:14px;line-height:1;" class="fha-rule-remove">\u00D7</span>';
      h += '</div>';
    }
    el.innerHTML = h;
    /* Bind toggle/remove */
    var toggles = el.querySelectorAll(".fha-rule-toggle");
    for (var t = 0; t < toggles.length; t++) {
      toggles[t].onclick = function () {
        var idx = parseInt(this.parentNode.getAttribute("data-ridx"));
        if (isNaN(idx) || !mapActiveRules[idx]) return;
        mapActiveRules[idx].visible = !mapActiveRules[idx].visible;
        renderActiveRulesList();
        rebuildMapLayers();
      };
    }
    var removes = el.querySelectorAll(".fha-rule-remove");
    for (var r = 0; r < removes.length; r++) {
      removes[r].onclick = function () {
        var idx = parseInt(this.parentNode.getAttribute("data-ridx"));
        if (isNaN(idx)) return;
        var rid = mapActiveRules[idx].id;
        mapActiveRules.splice(idx, 1);
        /* Recalculate raw event count and truncation */
        mapRawEventCount = 0;
        mapTruncated = false;
        for (var rc = 0; rc < mapActiveRules.length; rc++) {
          mapRawEventCount = mapRawEventCount + (mapActiveRules[rc].rawCount || 0);
          if (mapActiveRules[rc].truncated) mapTruncated = true;
        }
        /* Remove enriched points for this rule */
        var kept = [];
        for (var p = 0; p < mapEnrichedPoints.length; p++) {
          if (mapEnrichedPoints[p].ruleId !== rid) kept.push(mapEnrichedPoints[p]);
        }
        mapEnrichedPoints = kept;
        renderActiveRulesList();
        rebuildMapLayers();
        updateStatsCards();
        updateVehiclePanel();
      };
    }
  }

  function reloadAllRules() {
    mapEnrichedPoints = [];
    mapRawEventCount = 0;
    mapTruncated = false;
    for (var i = 0; i < mapActiveRules.length; i++) {
      loadRuleData(mapActiveRules[i].id);
    }
    if (mapActiveRules.length === 0) {
      rebuildMapLayers(); updateStatsCards(); updateVehiclePanel();
    }
  }

  function loadRuleData(ruleId) {
    var statsEl = document.getElementById("fha-map-stats");
    if (statsEl) statsEl.innerHTML = '<span style="color:' + C.blue + ';">Loading events\u2026</span>';
    /* Remove old points for this rule */
    var kept = [];
    for (var x = 0; x < mapEnrichedPoints.length; x++) {
      if (mapEnrichedPoints[x].ruleId !== ruleId) kept.push(mapEnrichedPoints[x]);
    }
    mapEnrichedPoints = kept;
    var range = getMapDateRange();
    var ruleObj = null;
    for (var ri = 0; ri < mapActiveRules.length; ri++) {
      if (mapActiveRules[ri].id === ruleId) { ruleObj = mapActiveRules[ri]; break; }
    }
    if (!ruleObj) return;
    var evtLimit = 10000;
    storedApi.call("Get", {
      typeName: "ExceptionEvent",
      search: { ruleSearch: { id: ruleId }, fromDate: range.from, toDate: range.to },
      resultsLimit: evtLimit
    }, function (events) {
      if (!events || events.length === 0) {
        ruleObj.rawCount = 0;
        ruleObj.truncated = false;
        mapRawEventCount = 0;
        mapTruncated = false;
        for (var zz = 0; zz < mapActiveRules.length; zz++) {
          mapRawEventCount = mapRawEventCount + (mapActiveRules[zz].rawCount || 0);
          if (mapActiveRules[zz].truncated) mapTruncated = true;
        }
        if (statsEl) statsEl.innerHTML = "No events for " + esc(ruleObj.name) + " in this period.";
        rebuildMapLayers(); updateStatsCards(); updateVehiclePanel();
        return;
      }
      /* Track raw counts and truncation */
      ruleObj.rawCount = events.length;
      ruleObj.truncated = (events.length >= evtLimit);
      mapRawEventCount = 0;
      mapTruncated = false;
      for (var rc = 0; rc < mapActiveRules.length; rc++) {
        mapRawEventCount = mapRawEventCount + (mapActiveRules[rc].rawCount || 0);
        if (mapActiveRules[rc].truncated) mapTruncated = true;
      }
      if (statsEl) statsEl.innerHTML = '<span style="color:' + C.blue + ';">' + events.length + ' events. Fetching GPS\u2026</span>';
      var devMap = {}, devList = [];
      for (var i = 0; i < events.length; i++) {
        var did = events[i].device ? events[i].device.id : null;
        if (!did) continue;
        /* Skip archived devices */
        if (activeDeviceIds && !activeDeviceIds[did]) continue;
        if (!devMap[did]) { devMap[did] = []; devList.push(did); }
        devMap[did].push(events[i]);
      }
      fetchDeviceNames(devList, function () {
        fetchLogsForDevices(devList, range.from, range.to, function (logsByDev) {
          for (var d = 0; d < devList.length; d++) {
            var id = devList[d];
            var devEvts = devMap[id];
            var logs = logsByDev[id] || [];
            if (logs.length === 0) continue;
            logs.sort(function (a, b) { return new Date(a.dateTime).getTime() - new Date(b.dateTime).getTime(); });
            for (var e = 0; e < devEvts.length; e++) {
              var evTime = new Date(devEvts[e].activeFrom).getTime();
              var nr = findNearestLog(logs, evTime);
              if (nr && nr.latitude && nr.longitude && nr.latitude !== 0 && nr.longitude !== 0) {
                mapEnrichedPoints.push({
                  lat: nr.latitude, lng: nr.longitude,
                  deviceId: id, deviceName: cachedDeviceNames[id] || id,
                  dateTime: devEvts[e].activeFrom,
                  ruleId: ruleId, ruleName: ruleObj.name, color: ruleObj.color
                });
              }
            }
          }
          rebuildMapLayers();
          updateStatsCards();
          updateVehiclePanel();
          if (statsEl) {
            var total = mapEnrichedPoints.length;
            var msg = mapRawEventCount + ' events found, ' + total + ' mapped across ' + mapActiveRules.length + ' rule' + (mapActiveRules.length > 1 ? 's' : '');
            if (mapTruncated) msg += ' <span style="color:' + C.dangerDark + ';">(results capped \u2014 narrow date range for complete data)</span>';
            statsEl.innerHTML = msg;
          }
        });
      });
    }, function () {
      if (statsEl) statsEl.innerHTML = '<span style="color:' + C.dangerDark + ';">Error loading events.</span>';
    });
  }

  function fetchLogsForDevices(deviceIds, fromDate, toDate, cb) {
    var results = {}, idx = 0;
    var statsEl = document.getElementById("fha-map-stats");
    function next() {
      if (idx >= deviceIds.length) { cb(results); return; }
      var did = deviceIds[idx]; idx++;
      if (statsEl) statsEl.innerHTML = '<span style="color:' + C.blue + ';">GPS ' + idx + '/' + deviceIds.length + '</span>';
      var logLimit = 500;
      if (mapDateRange === "week") logLimit = 1000;
      else if (mapDateRange === "month") logLimit = 2000;
      storedApi.call("Get", {
        typeName: "LogRecord",
        search: { deviceSearch: { id: did }, fromDate: fromDate, toDate: toDate },
        resultsLimit: logLimit
      }, function (recs) { results[did] = recs; next(); }, function () { results[did] = []; next(); });
    }
    next();
  }

  function findNearestLog(logs, target) {
    if (logs.length === 0) return null;
    var lo = 0, hi = logs.length - 1;
    while (lo < hi) {
      var mid = Math.floor((lo + hi) / 2);
      if (new Date(logs[mid].dateTime).getTime() < target) lo = mid + 1; else hi = mid;
    }
    var best = logs[lo];
    if (lo > 0) {
      var d1 = Math.abs(new Date(logs[lo].dateTime).getTime() - target);
      var d2 = Math.abs(new Date(logs[lo - 1].dateTime).getTime() - target);
      if (d2 < d1) best = logs[lo - 1];
    }
    return best;
  }

  function getFilteredPoints() {
    var pts = [];
    for (var i = 0; i < mapEnrichedPoints.length; i++) {
      var p = mapEnrichedPoints[i];
      /* Check rule visible */
      var rVis = false;
      for (var r = 0; r < mapActiveRules.length; r++) {
        if (mapActiveRules[r].id === p.ruleId && mapActiveRules[r].visible) { rVis = true; break; }
      }
      if (!rVis) continue;
      if (mapVehicleFilter && p.deviceId !== mapVehicleFilter) continue;
      pts.push(p);
    }
    return pts;
  }

  function rebuildMapLayers() {
    if (!mapInstance || !window.L) return;
    if (heatLayerInstance) { mapInstance.removeLayer(heatLayerInstance); heatLayerInstance = null; }
    if (mapMarkersLayer) mapMarkersLayer.clearLayers();
    var legendEl = document.getElementById("fha-map-legend");
    var pts = getFilteredPoints();
    if (pts.length === 0) {
      if (legendEl) legendEl.style.display = "none";
      return;
    }
    /* Heatmap from all visible points */
    var heatPts = [];
    for (var i = 0; i < pts.length; i++) {
      heatPts.push([pts[i].lat, pts[i].lng, 1]);
    }
    heatLayerInstance = L.heatLayer(heatPts, {
      radius: 25, blur: 15, maxZoom: 15, max: 1.0,
      gradient: { 0.2: "#2196F3", 0.4: "#4CAF50", 0.6: "#FFC107", 0.8: "#FF9800", 1.0: "#F44336" }
    }).addTo(mapInstance);
    /* Color-coded markers with popups (use L.marker for cluster support) */
    for (var j = 0; j < pts.length; j++) {
      var p = pts[j];
      var dt = "";
      try {
        var dd = new Date(p.dateTime);
        dt = dd.toLocaleDateString("en-AU", { day: "numeric", month: "short" }) + " " + dd.toLocaleTimeString("en-AU", { hour: "2-digit", minute: "2-digit" });
      } catch (e) { dt = p.dateTime; }
      var popHtml = '<div style="font-family:Roboto,sans-serif;font-size:12px;min-width:160px;">' +
        '<div style="font-weight:600;margin:0 0 4px 0;">' + esc(p.deviceName) + '</div>' +
        '<div style="color:#556575;margin:0 0 2px 0;">' + esc(p.ruleName) + '</div>' +
        '<div style="color:#556575;margin:0 0 6px 0;">' + esc(dt) + '</div>' +
        '<a href="' + gtExcLink(p.deviceId, [p.ruleId]) + '" target="_top" style="color:#0078D3;text-decoration:none;font-size:11px;">View in Exceptions \u2192</a>' +
        '</div>';
      var dotIcon = L.divIcon({
        html: '<div style="width:10px;height:10px;border-radius:50%;background:' + p.color + ';border:1.5px solid #fff;box-shadow:0 1px 2px rgba(0,0,0,0.3);"></div>',
        className: '',
        iconSize: L.point(10, 10),
        iconAnchor: L.point(5, 5)
      });
      var marker = L.marker([p.lat, p.lng], { icon: dotIcon }).bindPopup(popHtml, { maxWidth: 220 });
      marker._fhaData = { deviceId: p.deviceId, deviceName: p.deviceName, ruleName: p.ruleName, ruleId: p.ruleId, dateTime: p.dateTime, color: p.color };
      marker.addTo(mapMarkersLayer);
    }
    /* Fit bounds */
    var lats = [], lngs = [];
    for (var k = 0; k < pts.length; k++) { lats.push(pts[k].lat); lngs.push(pts[k].lng); }
    if (lats.length > 1) {
      mapInstance.fitBounds(L.latLngBounds(
        [Math.min.apply(null, lats) - 0.005, Math.min.apply(null, lngs) - 0.005],
        [Math.max.apply(null, lats) + 0.005, Math.max.apply(null, lngs) + 0.005]
      ), { padding: [40, 40] });
    } else if (lats.length === 1) {
      mapInstance.setView([lats[0], lngs[0]], 14);
    }
    if (legendEl) legendEl.style.display = "block";
  }

  function updateStatsCards() {
    var pts = getFilteredPoints();
    /* Total events (raw API count) */
    var c0 = document.getElementById("fha-card-val-0");
    if (c0) c0.textContent = (mapActiveRules.length > 0) ? mapRawEventCount : "--";
    /* Unique vehicles */
    var devs = {};
    for (var i = 0; i < pts.length; i++) devs[pts[i].deviceId] = true;
    var devCount = 0;
    for (var k in devs) { if (devs.hasOwnProperty(k)) devCount++; }
    var c1 = document.getElementById("fha-card-val-1");
    if (c1) c1.textContent = (mapActiveRules.length > 0) ? devCount : "--";
    /* Peak hour */
    var hours = {};
    for (var j = 0; j < pts.length; j++) {
      try {
        var hr = new Date(pts[j].dateTime).getHours();
        hours[hr] = (hours[hr] || 0) + 1;
      } catch (e) {}
    }
    var peakHr = "--", peakCount = 0;
    for (var hk in hours) {
      if (hours.hasOwnProperty(hk) && hours[hk] > peakCount) { peakCount = hours[hk]; peakHr = hk; }
    }
    var c2 = document.getElementById("fha-card-val-2");
    if (c2) {
      if (peakHr !== "--") {
        var h12 = parseInt(peakHr);
        var ampm = h12 >= 12 ? "pm" : "am";
        if (h12 === 0) h12 = 12; else if (h12 > 12) h12 -= 12;
        c2.innerHTML = h12 + '<span style="font-size:11px;font-weight:400;">' + ampm + '</span>';
      } else { c2.textContent = "--"; }
    }
    /* Mapped locations */
    var c3 = document.getElementById("fha-card-val-3");
    if (c3) c3.textContent = (mapActiveRules.length > 0) ? pts.length : "--";
  }

  function updateVehiclePanel() {
    var el = document.getElementById("fha-map-vehicles");
    if (!el) return;
    /* Only count visible-rule points */
    var visPts = [];
    for (var i = 0; i < mapEnrichedPoints.length; i++) {
      var p = mapEnrichedPoints[i], vis = false;
      for (var r = 0; r < mapActiveRules.length; r++) {
        if (mapActiveRules[r].id === p.ruleId && mapActiveRules[r].visible) { vis = true; break; }
      }
      if (vis) visPts.push(p);
    }
    var devCounts = {}, devNames = {};
    for (var j = 0; j < visPts.length; j++) {
      var did = visPts[j].deviceId;
      devCounts[did] = (devCounts[did] || 0) + 1;
      devNames[did] = visPts[j].deviceName;
    }
    /* Sort by count desc */
    var devArr = [];
    for (var dk in devCounts) {
      if (devCounts.hasOwnProperty(dk)) devArr.push({ id: dk, name: devNames[dk], count: devCounts[dk] });
    }
    devArr.sort(function (a, b) { return b.count - a.count; });
    if (devArr.length === 0) {
      el.innerHTML = '<div style="padding:12px;font-size:11px;color:' + C.textMuted + ';text-align:center;">No vehicle data</div>';
      return;
    }
    var maxCount = devArr[0].count;
    var h = '';
    /* All vehicles option */
    h += '<div class="fha-veh-item" data-vid="" style="display:flex;align-items:center;gap:8px;padding:6px 12px;cursor:pointer;font-size:11px;background:' + (!mapVehicleFilter ? C.blueLight : "transparent") + ';border-left:3px solid ' + (!mapVehicleFilter ? C.blue : "transparent") + ';">';
    h += '<span style="flex:1;font-weight:' + (!mapVehicleFilter ? "600" : "400") + ';color:' + C.textPrimary + ';">All vehicles</span>';
    h += '<span style="color:' + C.textMuted + ';">' + visPts.length + '</span></div>';
    for (var v = 0; v < devArr.length; v++) {
      var d = devArr[v];
      var isActive = (mapVehicleFilter === d.id);
      var barW = maxCount > 0 ? Math.round((d.count / maxCount) * 100) : 0;
      /* Determine dominant rule color for this vehicle */
      var dColor = C.dangerDark;
      var ruleCounts = {};
      for (var rc = 0; rc < visPts.length; rc++) {
        if (visPts[rc].deviceId === d.id) {
          var rId = visPts[rc].ruleId;
          ruleCounts[rId] = (ruleCounts[rId] || 0) + 1;
        }
      }
      var topRid = null, topRc = 0;
      for (var rk in ruleCounts) {
        if (ruleCounts.hasOwnProperty(rk) && ruleCounts[rk] > topRc) { topRc = ruleCounts[rk]; topRid = rk; }
      }
      for (var ar = 0; ar < mapActiveRules.length; ar++) {
        if (mapActiveRules[ar].id === topRid) { dColor = mapActiveRules[ar].color; break; }
      }
      h += '<div class="fha-veh-item" data-vid="' + esc(d.id) + '" style="display:flex;align-items:center;gap:8px;padding:6px 12px;cursor:pointer;font-size:11px;background:' + (isActive ? C.blueLight : "transparent") + ';border-left:3px solid ' + (isActive ? C.blue : "transparent") + ';">';
      h += '<span style="width:8px;height:8px;border-radius:50%;background:' + dColor + ';flex-shrink:0;"></span>';
      h += '<div style="flex:1;min-width:0;">';
      h += '<div style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:' + (isActive ? "600" : "400") + ';color:' + C.textPrimary + ';" title="' + esc(d.name) + '">' + esc(d.name) + '</div>';
      h += '<div style="height:3px;background:' + C.bgSecondary + ';border-radius:2px;margin:3px 0 0 0;"><div style="height:100%;width:' + barW + '%;background:' + dColor + ';border-radius:2px;opacity:0.6;"></div></div>';
      h += '</div>';
      h += '<span style="color:' + C.textMuted + ';font-weight:600;flex-shrink:0;">' + d.count + '</span>';
      h += '</div>';
    }
    el.innerHTML = h;
    /* Bind clicks */
    var items = el.querySelectorAll(".fha-veh-item");
    for (var vi = 0; vi < items.length; vi++) {
      items[vi].onclick = function () {
        var vid = this.getAttribute("data-vid");
        mapVehicleFilter = vid || null;
        rebuildMapLayers();
        updateStatsCards();
        updateVehiclePanel();
      };
    }
  }

  /* ── Lifecycle ── */
  return {
    initialize: function (api, state, callback) {
      storedApi = api;
      readGroupFilter(state);
      api.getSession(function (session) {
        currentDb = session.database || "";
        currentUserEmail = session.userName || "";
        currentUserName = (session.userName || "").split("@")[0];
        currentFirstName = currentUserName.charAt(0).toUpperCase() + currentUserName.slice(1);
        /* Store session credentials for n8n webhook calls */
        sessionCredentials = {
          database: session.database || "",
          userName: session.userName || "",
          sessionId: session.sessionId || "",
          server: session.server || "my.geotab.com"
        };
        /* Default email recipient to current user if not set */
        if (!emailConfig.recipient) emailConfig.recipient = currentUserEmail;
        greetingIndex = Math.floor(Math.random() * greetings.length);
        fetchGeotabUsers(api);
        fetchGeotabGroups(api);
        fetchActiveDevices(api);
        showIdle();
      });
      callback();
    },
    focus: function (api, state) {
      storedApi = api;
      fetchActiveDevices(api);
      var prevFilter = activeGroupFilter.join(",");
      readGroupFilter(state);
      var newFilter = activeGroupFilter.join(",");
      if (prevFilter !== newFilter && lastData) {
        /* Group filter changed — re-render existing results with new filter */
        render(lastData);
      } else if (!lastData) {
        showIdle();
      }
    },
    blur: function (api, state) {}
  };
};
</script>
</body>
</html>
